---
- name: Desplegar microservicios de prueba enrutados por nombre de host
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Crear namespace de las apps de prueba
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: demo-apps

    - name: Crear ConfigMaps y Secrets de cada microservicio
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: app-a-config
              namespace: demo-apps
            data:
              GREETING: "Hola desde App A"
          - apiVersion: v1
            kind: Secret
            metadata:
              name: app-a-secret
              namespace: demo-apps
            stringData:
              API_KEY: "clave-secreta-app-a"
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: app-b-config
              namespace: demo-apps
            data:
              GREETING: "Hola desde App B"
          - apiVersion: v1
            kind: Secret
            metadata:
              name: app-b-secret
              namespace: demo-apps
            stringData:
              API_KEY: "clave-secreta-app-b"

    - name: Desplegar el microservicio App A (Deployment + Service)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-a
              namespace: demo-apps
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: app-a
              template:
                metadata:
                  labels:
                    app: app-a
                spec:
                  initContainers:
                    - name: wait-for-dns
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - until nslookup kubernetes.default.svc.cluster.local; do echo "Esperando a que el DNS del clúster esté listo..."; sleep 2; done
                  containers:
                    - name: app-a
                      image: nginx:alpine
                      command:
                        - sh
                        - -c
                        - 'echo "<h1>$GREETING</h1><p>API_KEY=$API_KEY</p>" > /usr/share/nginx/html/index.html && nginx -g "daemon off;"'
                      envFrom:
                        - configMapRef:
                            name: app-a-config
                        - secretRef:
                            name: app-a-secret
                      ports:
                        - containerPort: 80
          - apiVersion: v1
            kind: Service
            metadata:
              name: app-a-service
              namespace: demo-apps
            spec:
              selector:
                app: app-a
              ports:
                - port: 80
                  targetPort: 80

    - name: Desplegar el microservicio App B (Deployment + Service)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-b
              namespace: demo-apps
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: app-b
              template:
                metadata:
                  labels:
                    app: app-b
                spec:
                  initContainers:
                    - name: wait-for-dns
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - until nslookup kubernetes.default.svc.cluster.local; do echo "Esperando a que el DNS del clúster esté listo..."; sleep 2; done
                  containers:
                    - name: app-b
                      image: nginx:alpine
                      command:
                        - sh
                        - -c
                        - 'echo "<h1>$GREETING</h1><p>API_KEY=$API_KEY</p>" > /usr/share/nginx/html/index.html && nginx -g "daemon off;"'
                      envFrom:
                        - configMapRef:
                            name: app-b-config
                        - secretRef:
                            name: app-b-secret
                      ports:
                        - containerPort: 80
          - apiVersion: v1
            kind: Service
            metadata:
              name: app-b-service
              namespace: demo-apps
            spec:
              selector:
                app: app-b
              ports:
                - port: 80
                  targetPort: 80

    - name: Esperar a que los Deployments de App A y App B estén listos
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n demo-apps rollout status deployment/{{ item }} --timeout=120s
      loop:
        - app-a
        - app-b
      changed_when: false

    - name: Crear el Ingress consolidado con enrutamiento por nombre de host
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: demo-ingress
            namespace: demo-apps
          spec:
            ingressClassName: nginx
            rules:
              - host: "app-a.{{ ingress_base_domain }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: app-a-service
                          port:
                            number: 80
              - host: "app-b.{{ ingress_base_domain }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: app-b-service
                          port:
                            number: 80

    - name: Mostrar resumen de las apps de prueba
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡MICROSERVICIOS DE PRUEBA DESPLEGADOS CON ÉXITO!"
          - "  "
          - "  App A: http://app-a.{{ ingress_base_domain }}"
          - "  App B: http://app-b.{{ ingress_base_domain }}"
          - "  "
          - "  (requiere que la IP del Ingress esté en tu /etc/hosts, ver paso anterior)"
          - "════════════════════════════════════════════════════════════════"
