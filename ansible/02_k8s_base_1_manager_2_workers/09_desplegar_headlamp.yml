---
- name: Desplegar Headlamp Dashboard en el Clúster Multinodo
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Agregar el repositorio de Headlamp a Helm
      ansible.builtin.command: helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/ --force-update
      changed_when: false

    - name: Actualizar repositorios de Helm
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Instalar Headlamp usando Helm en namespace headlamp
      ansible.builtin.command: >
        helm upgrade --install headlamp headlamp/headlamp
        --namespace headlamp
        --create-namespace
        --kubeconfig {{ kubeconfig_path }}
        --set service.type=NodePort
        --set service.nodePort=32082
      changed_when: false

    - name: Esperar a que el deployment de Headlamp esté listo
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status deployment/headlamp -n headlamp --timeout=90s
      changed_when: false

    - name: Crear ServiceAccount y ClusterRoleBinding para Headlamp
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: headlamp-admin
              namespace: headlamp
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: headlamp-admin-binding
            subjects:
            - kind: ServiceAccount
              name: headlamp-admin
              namespace: headlamp
            roleRef:
              kind: ClusterRole
              name: cluster-admin
              apiGroup: rbac.authorization.k8s.io

    - name: Comprobar si ya existe el archivo del token de Headlamp
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/headlamp_token.txt"
      register: token_file_status

    - name: Obtener token de acceso para Headlamp (válido por 1 año)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} create token headlamp-admin -n headlamp --duration=8760h
      register: token_out
      changed_when: false
      when: not token_file_status.stat.exists

    - name: Guardar el token de Headlamp en un archivo local
      ansible.builtin.copy:
        content: "{{ token_out.stdout }}"
        dest: "{{ playbook_dir }}/headlamp_token.txt"
        mode: "0600"
      when: not token_file_status.stat.exists

    - name: Mostrar datos de conexión a Headlamp
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  Headlamp Dashboard listo!"
          - "  URL de acceso (Manager): http://10.207.154.50:32082"
          - "  "
          - "  El token de inicio de sesión ha sido guardado de forma segura en:"
          - "  {{ playbook_dir }}/headlamp_token.txt"
          - "════════════════════════════════════════════════════════════════"
