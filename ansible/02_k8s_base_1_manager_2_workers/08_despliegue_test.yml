---
- name: Verificar Clúster y Desplegar Aplicación de Prueba
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Esperar un momento a que los workers estén en estado Ready
      ansible.builtin.pause:
        seconds: 15

    - name: Obtener estado de los nodos del clúster
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} get nodes -o wide
      register: nodes_status
      changed_when: false

    - name: Mostrar estado de los nodos
      ansible.builtin.debug:
        var: nodes_status.stdout_lines

    - name: Crear namespace de prueba
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: test-multinode

    - name: Desplegar Nginx con 2 replicas expuesto por NodePort
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: nginx-multinode
              namespace: test-multinode
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: nginx
              template:
                metadata:
                  labels:
                    app: nginx
                spec:
                  containers:
                  - name: nginx
                    image: nginx:alpine
                    ports:
                    - containerPort: 80
          - apiVersion: v1
            kind: Service
            metadata:
              name: nginx-service
              namespace: test-multinode
            spec:
              type: NodePort
              ports:
              - port: 80
                targetPort: 80
                nodePort: 32080
              selector:
                app: nginx

    - name: Esperar a que el deployment de Nginx esté completamente desplegado
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status deployment/nginx-multinode -n test-multinode --timeout=90s
      changed_when: false

    - name: Realizar petición HTTP de prueba a través de la IP del Worker 1 (10.207.154.51)
      ansible.builtin.uri:
        url: "http://10.207.154.51:32080"
        method: GET
        status_code: 200
      register: worker1_check
      retries: 10
      delay: 5
      until: worker1_check.status == 200

    - name: Realizar petición HTTP de prueba a través de la IP del Worker 2 (10.207.154.52)
      ansible.builtin.uri:
        url: "http://10.207.154.52:32080"
        method: GET
        status_code: 200
      register: worker2_check
      retries: 10
      delay: 5
      until: worker2_check.status == 200

    - name: Mostrar resultado de verificación de clúster multinodo
      ansible.builtin.debug:
        msg: "Verificación OK! El clúster responde correctamente en ambos workers (puerto 32080)."
