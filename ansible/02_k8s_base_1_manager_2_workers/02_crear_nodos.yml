---
- name: Crear los nodos LXD para el clúster Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Crear/actualizar máquinas virtuales LXD para los nodos k8s
      community.general.lxd_container:
        name: "{{ item }}"
        type: virtual-machine
        state: started
        source:
          type: image
          alias: "{{ lxd_image }}"
        config:
          limits.cpu: "{{ hostvars[item].lxd_cpu | string }}"
          limits.memory: "{{ hostvars[item].lxd_mem }}"
        devices:
          eth0:
            type: nic
            network: "{{ lxd_network }}"
            name: eth0
            "ipv4.address": "{{ hostvars[item].ansible_host }}"
          root:
            type: disk
            path: /
            pool: default
            size: "{{ hostvars[item].lxd_disk }}"
        wait_for_ipv4_addresses: false
        timeout: 90
      loop: "{{ groups['k8s_nodes'] }}"

    - name: Esperar a que el agente de LXD esté listo en las máquinas virtuales
      ansible.builtin.command: >
        lxc exec {{ item }} -- true
      register: lxd_agent_status
      until: lxd_agent_status.rc == 0
      retries: 30
      delay: 2
      loop: "{{ groups['k8s_nodes'] }}"
      changed_when: false

    - name: Asegurar que el directorio .ssh existe en las máquinas virtuales
      ansible.builtin.command: >
        lxc exec {{ item }} -- mkdir -p /root/.ssh
      loop: "{{ groups['k8s_nodes'] }}"
      changed_when: false

    - name: Configurar permisos del directorio .ssh en las máquinas virtuales
      ansible.builtin.command: >
        lxc exec {{ item }} -- chmod 700 /root/.ssh
      loop: "{{ groups['k8s_nodes'] }}"
      changed_when: false

    - name: Inyectar clave pública SSH ed25519 en las máquinas virtuales
      ansible.builtin.command: >
        lxc file push ~/.ssh/id_ed25519.pub {{ item }}/root/.ssh/authorized_keys
      loop: "{{ groups['k8s_nodes'] }}"
      changed_when: false

    - name: Configurar propietario root del directorio .ssh y sus archivos
      ansible.builtin.command: >
        lxc exec {{ item }} -- chown -R root:root /root/.ssh
      loop: "{{ groups['k8s_nodes'] }}"
      changed_when: false

    - name: Configurar permisos del archivo authorized_keys en las máquinas virtuales
      ansible.builtin.command: >
        lxc exec {{ item }} -- chmod 600 /root/.ssh/authorized_keys
      loop: "{{ groups['k8s_nodes'] }}"
      changed_when: false

    - name: Esperar a que SSH esté disponible en los nodos
      ansible.builtin.wait_for:
        host: "{{ hostvars[item].ansible_host }}"
        port: 22
        delay: 2
        timeout: 60
      loop: "{{ groups['k8s_nodes'] }}"

    - name: Nodos creados y accesibles por SSH
      ansible.builtin.debug:
        msg: "Nodo {{ item }} creado con IP {{ hostvars[item].ansible_host }}"
      loop: "{{ groups['k8s_nodes'] }}"
