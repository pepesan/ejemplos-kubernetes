---
- name: Inicializar el primer manager del plano de control HA
  hosts: first_manager
  gather_facts: true
  tasks:
    - name: Comprobar si Kubernetes ya está inicializado
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Comprobar si el manifiesto estático de kube-vip ya existe
      ansible.builtin.stat:
        path: /etc/kubernetes/manifests/kube-vip.yaml
      register: kube_vip_manifest

    - name: Asegurar que el directorio /etc/kubernetes/manifests existe
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        mode: "0755"
      when: not kube_vip_manifest.stat.exists

    - name: Descargar la imagen de kube-vip vía containerd
      ansible.builtin.command: >
        ctr image pull {{ kube_vip_image }}
      when: not kube_vip_manifest.stat.exists
      changed_when: true

    - name: Generar el manifiesto estático de kube-vip para este manager
      ansible.builtin.shell: >
        ctr run --rm --net-host {{ kube_vip_image }} vip
        /kube-vip manifest pod
        --interface {{ k8s_vip_interface }}
        --address {{ k8s_vip_address }}
        --port {{ k8s_vip_port }}
        --controlplane --services --arp --leaderElection
        > /etc/kubernetes/manifests/kube-vip.yaml
      when: not kube_vip_manifest.stat.exists
      changed_when: true

    - name: Asegurar que el directorio /etc/kubernetes existe
      ansible.builtin.file:
        path: /etc/kubernetes
        state: directory
        mode: "0755"
      when: not kubeadm_admin_conf.stat.exists

    - name: Crear archivo de configuración de kubeadm
      ansible.builtin.copy:
        content: |
          apiVersion: kubeadm.k8s.io/v1beta3
          kind: InitConfiguration
          localAPIEndpoint:
            advertiseAddress: "{{ ansible_host }}"
          nodeRegistration:
            name: "{{ inventory_hostname }}"
            criSocket: unix:///var/run/containerd/containerd.sock
            imagePullPolicy: IfNotPresent
          ---
          apiVersion: kubeadm.k8s.io/v1beta3
          kind: ClusterConfiguration
          controlPlaneEndpoint: "{{ k8s_vip_address }}:{{ k8s_vip_port }}"
          networking:
            podSubnet: "{{ k8s_pod_network_cidr }}"
          ---
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          failSwapOn: false
          cgroupDriver: systemd
          featureGates:
            KubeletInUserNamespace: true
        dest: /etc/kubernetes/kubeadm-config.yaml
        mode: "0644"
      when: not kubeadm_admin_conf.stat.exists

    - name: Inicializar el plano de control con kubeadm (endpoint HA + upload-certs)
      ansible.builtin.command: >
        kubeadm init
        --config /etc/kubernetes/kubeadm-config.yaml
        --upload-certs
        --ignore-preflight-errors=SystemVerification,Swap
      register: kubeadm_init_output
      when: not kubeadm_admin_conf.stat.exists
      changed_when: true

    - name: Crear directorio .kube para el usuario root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: "0755"

    - name: Copiar configuración de admin.conf a .kube/config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: "0600"

    - name: Instalar CNI Flannel
      ansible.builtin.command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      register: flannel_install
      changed_when: "'created' in flannel_install.stdout or 'configured' in flannel_install.stdout"

    - name: Descargar admin.conf a la máquina local (kubeconfig.yaml)
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ inventory_dir }}/kubeconfig.yaml"
        flat: true

    - name: Aplicar el RBAC de kube-vip (necesario para el leader-election de los managers 2 y 3)
      kubernetes.core.k8s:
        kubeconfig: "{{ inventory_dir }}/kubeconfig.yaml"
        state: present
        src: "{{ playbook_dir }}/files/kube-vip-rbac.yaml"
      delegate_to: localhost

    - name: Generar comando de unión para los workers
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Guardar comando de unión en archivo local
      ansible.builtin.copy:
        content: "{{ join_command_raw.stdout }}"
        dest: "{{ inventory_dir }}/join_command.txt"
        mode: "0600"
      delegate_to: localhost

    - name: Reimprimir la certificate-key de forma re-ejecutable (para unir más managers)
      ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
      register: upload_certs_out
      changed_when: false

    - name: Extraer la certificate-key de la salida
      ansible.builtin.set_fact:
        certificate_key: "{{ upload_certs_out.stdout_lines[-1] }}"

    - name: Guardar la certificate-key en archivo local
      ansible.builtin.copy:
        content: "{{ certificate_key }}"
        dest: "{{ inventory_dir }}/certificate_key.txt"
        mode: "0600"
      delegate_to: localhost

    - name: Mostrar instrucciones para usar kubectl desde el host
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡PRIMER MANAGER DEL CLÚSTER HA INICIALIZADO!"
          - "  "
          - "  VIP del plano de control: {{ k8s_vip_address }}:{{ k8s_vip_port }}"
          - "  "
          - "  Para usar kubectl desde tu máquina física (host), ejecuta:"
          - "  export KUBECONFIG={{ inventory_dir }}/kubeconfig.yaml"
          - "  "
          - "  Prueba la conexión ejecutando:"
          - "  kubectl get nodes"
          - "════════════════════════════════════════════════════════════════"
