---
- name: Desplegar Longhorn en Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Etiquetar los nodos workload
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Node
          metadata:
            name: "{{ item }}"
            labels:
              node.longhorn.io/workload-node: "true"
      loop: "{{ groups['workload_workers'] }}"

    - name: Etiquetar los nodos storage para Longhorn
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Node
          metadata:
            name: "{{ item }}"
            labels:
              node.longhorn.io/storage-node: "true"
              node.longhorn.io/create-default-disk: "true"
      loop: "{{ groups['storage_workers'] }}"

    - name: Aplicar taints de almacenamiento a los nodos storage
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} taint node {{ item }} storage-node=true:NoSchedule
      loop: "{{ groups['storage_workers'] }}"
      register: taint_out
      failed_when:
        - taint_out.rc != 0
        - "'already has' not in taint_out.stderr"
      changed_when: "'tainted' in taint_out.stdout"

    - name: Agregar el repositorio de Longhorn a Helm
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io
        force_update: true

    - name: Crear namespace longhorn-system si no existe
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: longhorn-system

    - name: Instalar o actualizar Longhorn usando Helm
      kubernetes.core.helm:
        name: longhorn
        chart_ref: longhorn/longhorn
        chart_version: "{{ longhorn_chart_version }}"
        release_namespace: longhorn-system
        kubeconfig: "{{ kubeconfig_path }}"
        values:
          defaultSettings:
            createDefaultDiskLabeledNodes: true
            defaultReplicaCount: 3
            taintToleration: "storage-node=true:NoSchedule"
          persistence:
            defaultClass: true
            defaultClassReplicaCount: 3
          longhornManager:
            tolerations:
              - key: storage-node
                operator: Equal
                value: "true"
                effect: NoSchedule
          service:
            ui:
              type: NodePort
              nodePort: 32085

    - name: Esperar a que Longhorn Manager esté listo en nodos de cómputo y almacenamiento
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status daemonset/longhorn-manager -n longhorn-system --timeout=300s
      changed_when: false

    - name: Esperar a que el deployment de la interfaz de Longhorn esté listo
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status deployment/longhorn-ui -n longhorn-system --timeout=180s
      changed_when: false

    - name: Mostrar datos de acceso al Panel de Longhorn
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡LONGHORN DESPLEGADO CON ÉXITO!"
          - "  "
          - "  Panel de Administración de Longhorn: http://{{ k8s_vip_address }}:32085"
          - "  "
          - "  StorageClass por defecto: 'longhorn'"
          - "  Número de réplicas configurado: 3 (óptimo para 3 workers de storage)"
          - "  "
          - "  Taints aplicados a nodos de storage: storage-node=true:NoSchedule"
          - "  Discos por defecto limitados a nodos etiquetados como storage."
          - "════════════════════════════════════════════════════════════════"
