---
- name: Comprobar requisitos para el nodo k8s en LXD
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Asegurar que existe el par de claves SSH (ed25519) en el host
      ansible.builtin.openssh_keypair:
        path: "~/.ssh/id_ed25519"
        type: ed25519
        comment: "k8s-lxd-host-key"

    - name: Asegurar que las colecciones necesarias de Ansible Galaxy estén instaladas
      community.general.ansible_galaxy_install:
        name: community.general
        type: collection

    - name: Comprobar que existe el comando lxc
      ansible.builtin.command: which lxc
      register: lxc_check
      changed_when: false
      failed_when: false

    - name: Fallar si no existe el comando lxc
      ansible.builtin.fail:
        msg: "Falta el comando 'lxc' (LXD) en este host."
      when: lxc_check.rc != 0

    - name: Listar imágenes LXD locales
      ansible.builtin.command: lxc image list -f csv -c l
      register: image_list
      changed_when: false

    - name: Informar sobre descarga de imagen base (esto puede tardar unos minutos)
      ansible.builtin.debug:
        msg: "La imagen local '{{ lxd_image }}' no existe. Descargando e importando Ubuntu 26.04 VM desde los repositorios oficiales de LXD..."
      when: lxd_image not in image_list.stdout_lines

    - name: Descargar e importar la imagen base Ubuntu 26.04 VM
      ansible.builtin.command: >
        lxc image copy ubuntu:26.04 local: --alias {{ lxd_image }} --vm
      when: lxd_image not in image_list.stdout_lines
      changed_when: true

    - name: Listar redes LXD
      ansible.builtin.command: lxc network list -f csv
      register: network_list
      changed_when: false

    - name: Fallar si no existe la red gestionada
      ansible.builtin.fail:
        msg: "No existe la red '{{ lxd_network }}'."
      when: lxd_network not in (network_list.stdout_lines | map('split', ',') | map('first') | list)

    - name: Requisitos OK
      ansible.builtin.debug:
        msg: "LXD, imagen base '{{ lxd_image }}' y red '{{ lxd_network }}' están listos."
