---
- name: Destruir el nodo Kubernetes LXD
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Detener y eliminar la máquina virtual del nodo k8s
      community.general.lxd_container:
        name: "{{ item }}"
        type: virtual-machine
        state: absent
        force_stop: true
        timeout: 30
      loop: "{{ groups['k8s_nodes'] }}"

    - name: Eliminar archivos locales temporales del clúster
      ansible.builtin.file:
        path: "{{ playbook_dir }}/{{ item }}"
        state: absent
      loop:
        - kubeconfig.yaml
        - headlamp_token.txt

    - name: Confirmación de eliminación
      ansible.builtin.debug:
        msg: "El nodo Kubernetes LXD {{ item }} ha sido eliminado con éxito y los archivos locales han sido limpiados."
      loop: "{{ groups['k8s_nodes'] }}"
