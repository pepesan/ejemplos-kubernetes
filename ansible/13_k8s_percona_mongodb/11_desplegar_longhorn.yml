---
# Diseño hiperconvergente (como el escenario 07, no el 03): sin separación de
# roles storage/workload — los 3 workers alojan tanto réplicas de Longhorn
# como Pods de MongoDB, encajando exactamente con las 6 réplicas de shard (una por worker).
- name: Desplegar Longhorn en Kubernetes (backend de almacenamiento persistente)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Agregar el repositorio de Longhorn a Helm
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io

    - name: Crear namespace longhorn-system si no existe
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: longhorn-system

    - name: Instalar o actualizar Longhorn usando Helm
      kubernetes.core.helm:
        name: longhorn
        chart_ref: longhorn/longhorn
        chart_version: "{{ longhorn_chart_version }}"
        release_namespace: longhorn-system
        kubeconfig: "{{ kubeconfig_path }}"
        values:
          defaultSettings:
            defaultReplicaCount: 3
          persistence:
            defaultClass: true
            defaultClassReplicaCount: 3
          service:
            ui:
              type: NodePort
              nodePort: 32085

    - name: Esperar a que Longhorn Manager esté listo en todos los workers
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status daemonset/longhorn-manager -n longhorn-system --timeout=300s
      changed_when: false

    - name: Esperar a que el deployment de la interfaz de Longhorn esté listo
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} rollout status deployment/longhorn-ui -n longhorn-system --timeout=180s
      changed_when: false

    - name: Mostrar datos de acceso al Panel de Longhorn
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡LONGHORN DESPLEGADO CON ÉXITO!"
          - "  "
          - "  Panel de Administración de Longhorn: http://{{ k8s_vip_address }}:32085"
          - "  StorageClass por defecto: 'longhorn' (replicación x3 en los 3 workers)"
          - "════════════════════════════════════════════════════════════════"
