# Inventario para clúster de Kubernetes HA en LXD (3 Managers + 6 Workers hiperconvergentes)
# La IP 10.207.154.49 queda reservada para la VIP de kube-vip (ver group_vars/all.yml)
# y no debe asignarse nunca a ningún host de este fichero.
#
# Diseño hiperconvergente (como los escenarios 07, 10, 11 y 12), pero con 6
# workers en vez de 3: el clúster MongoDB tiene 2 shards de 3 réplicas cada
# uno (6 Pods de datos en total), y cada réplica de shard necesita su propio
# nodo dedicado — de ahí los 6 workers. Los 3 config servers y los routers
# mongos (sin estado, sin necesidad de nodo dedicado) comparten esos mismos
# 6 workers sin restricción, ya que no forman parte de la prueba de
# escalado (que solo añade/quita shards completos).

[control_plane]
k8s-manager1 ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager2 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager3 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[first_manager]
k8s-manager1

[additional_managers]
k8s-manager2
k8s-manager3

[workers]
# lxd_cpu=3 (no 2) y lxd_disk=32GB (no 20GB): con 2 shards de 3 réplicas +
# 3 config servers + 3 mongos repartidos entre solo 6 workers, 2 vCPU por
# nodo se queda corto en cuanto la anti-affinity obligada por shard fuerza
# la colocación de dos Pods de BBDD (p.ej. de shards distintos) en el mismo
# nodo: cada Pod de shard consume ~800m de CPU (mongod + sidecars de
# logrotate/logs), y con solo 2000m por nodo no queda margen para que el
# scheduler recoloque una réplica tras un reinicio (visto en vivo: Pod
# `rs1-1` quedó en Pending indefinido por "Insufficient cpu" en los únicos
# nodos permitidos por su anti-affinity). El disco de 20GB también se quedó
# corto: 6 PVCs de 3Gi por nodo dejan muy poco margen bajo el umbral de
# reserva que exige Longhorn para programar una réplica nueva, causando
# volúmenes en estado "faulted" permanente (visto en vivo en dos nodos).
k8s-worker1 ansible_host=10.207.154.53 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker2 ansible_host=10.207.154.54 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker3 ansible_host=10.207.154.55 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker4 ansible_host=10.207.154.56 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker5 ansible_host=10.207.154.57 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker6 ansible_host=10.207.154.58 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB

[k8s_nodes:children]
control_plane
workers

# Grupo de Escalado: añade aquí los TRES workers nuevos que alojarán la
# nueva shard completa (una réplica de MongoDB por nodo, nunca comparte nodo
# con otra réplica). Ver 15_add_nodes.yml / 16_integrar_shard.yml /
# 17_eliminar_shard.yml.
[new_workers]
k8s-worker7 ansible_host=10.207.154.59 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker8 ansible_host=10.207.154.60 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
k8s-worker9 ansible_host=10.207.154.61 lxd_cpu=3 lxd_mem=5GB lxd_disk=32GB
