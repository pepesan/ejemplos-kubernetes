---
# El uso MÁS habitual de Vault en la práctica no es el motor de secretos
# dinámicos de BBDD (playbooks 19-20) sino el motor KV (Key-Value): un
# almacén cifrado de secretos ESTÁTICOS (los eliges tú, no los genera
# Vault), con control de acceso y auditoría, pero sin rotación automática.
# Es el caso de uso típico para credenciales de sistemas de terceros que no
# tienen un "database secrets engine" propio (una API externa, una licencia,
# etc.) — mucho más simple que el flujo dinámico, y el punto de entrada más
# habitual para cualquiera que empieza con Vault.
- name: Configurar y probar el motor KV de secretos estáticos
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
    vault_namespace: vault
    vault_credentials_file: "{{ playbook_dir }}/vault_credentials.json"
    kv_secret_path: "secret/demo-app/config"
  tasks:
    - name: Leer las credenciales de Vault desde el archivo local
      ansible.builtin.slurp:
        src: "{{ vault_credentials_file }}"
      register: vault_credentials_slurp

    - name: Fijar el token root como variable
      ansible.builtin.set_fact:
        vault_root_token: "{{ (vault_credentials_slurp.content | b64decode | from_json).root_token }}"
      no_log: true

    - name: Comprobar si el motor KV ya está habilitado
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault secrets list -format=json
      register: vault_secrets_list
      changed_when: false
      no_log: true

    # KV versión 2 (con control de versiones e historial), la variante
    # recomendada por HashiCorp frente a la v1.
    - name: Habilitar el motor KV v2 en la ruta "secret/"
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault secrets enable -path=secret -version=2 kv
      when: "'secret/' not in (vault_secrets_list.stdout | from_json)"
      changed_when: true

    - name: Escribir un secreto estático de ejemplo (api_key fija, elegida por nosotros)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault kv put {{ kv_secret_path }}
        api_key="clave-fija-de-ejemplo-12345"
        entorno="produccion"
      changed_when: true
      no_log: true

    - name: Leer de vuelta el secreto estático para confirmar que se guardó bien
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault kv get -format=json {{ kv_secret_path }}
      register: kv_secret_read
      changed_when: false
      no_log: true
      failed_when: (kv_secret_read.stdout | from_json).data.data.api_key != "clave-fija-de-ejemplo-12345"

    - name: Mostrar resumen del uso estándar de Vault (KV)
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡MOTOR KV (SECRETOS ESTÁTICOS) CONFIGURADO Y VERIFICADO!"
          - "  "
          - "  Secreto guardado y leído de vuelta en: {{ kv_secret_path }}"
          - "  "
          - "  A diferencia del secreto dinámico de los pasos 19-20 (generado"
          - "  por Vault, con TTL y revocación automática), este es un valor"
          - "  FIJO elegido por nosotros — el uso más habitual de Vault en la"
          - "  práctica: un almacén cifrado con control de acceso y auditoría,"
          - "  sin rotación automática."
          - "════════════════════════════════════════════════════════════════"
