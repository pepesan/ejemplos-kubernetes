# Inventario para clúster de Kubernetes HA en LXD (3 Managers + 3 Workers hiperconvergentes)
# La IP 10.207.154.49 queda reservada para la VIP de kube-vip (ver group_vars/all.yml)
# y no debe asignarse nunca a ningún host de este fichero.
#
# Diseño hiperconvergente (como los escenarios 07 y 10): los 3 workers alojan
# Longhorn, el clúster PXC (3 réplicas + 2 HAProxy) Y los 3 Pods de Vault (Raft
# HA) — sin nodos dedicados y sin prueba de escalado propia en este
# laboratorio (el escalado de PXC ya se demostró en el escenario 10; aquí el
# protagonista es Vault). lxd_mem sube de 3GB (escenario 10) a 4GB porque
# ahora cada worker aloja un Pod más (Vault) además de PXC/HAProxy/Longhorn.

[control_plane]
k8s-manager1 ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager2 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager3 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[first_manager]
k8s-manager1

[additional_managers]
k8s-manager2
k8s-manager3

[workers]
# lxd_disk=32GB (no 20GB): con Longhorn + PXC (3 réplicas + 2 HAProxy) + Vault
# (3 réplicas) compartiendo solo 3 workers, 20GB se queda corto — Longhorn
# necesita margen de reserva para poder programar cada nueva réplica y con
# 20GB los volúmenes quedan en "insufficient storage" (visto en vivo, mismo
# patrón ya conocido del escenario 13).
k8s-worker1 ansible_host=10.207.154.53 lxd_cpu=2 lxd_mem=4GB lxd_disk=32GB
k8s-worker2 ansible_host=10.207.154.54 lxd_cpu=2 lxd_mem=4GB lxd_disk=32GB
k8s-worker3 ansible_host=10.207.154.55 lxd_cpu=2 lxd_mem=4GB lxd_disk=32GB

[k8s_nodes:children]
control_plane
workers
