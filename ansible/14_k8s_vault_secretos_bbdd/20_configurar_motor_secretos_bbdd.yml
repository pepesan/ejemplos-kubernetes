---
# Configura el Database Secrets Engine de Vault apuntando al clúster PXC del
# escenario 10: a partir de aquí, Vault puede generar usuarios MySQL nuevos
# bajo demanda (credenciales dinámicas), en vez de repartir una contraseña
# estática.
#
# Vault necesita un usuario MySQL con privilegios para crear/borrar usuarios
# y conceder permisos (CREATE USER, GRANT OPTION, DROP USER) — se crea uno
# dedicado (`vault_admin`), NUNCA se usa el usuario root de PXC para esto:
# darle a Vault más privilegios de los estrictamente necesarios sería mala
# práctica de seguridad, aunque root "también funcionaría".
- name: Configurar el Database Secrets Engine de Vault (MySQL/PXC)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
    vault_namespace: vault
    vault_credentials_file: "{{ playbook_dir }}/vault_credentials.json"
    pxc_release_name: pxc-db
    vault_db_admin_user: vault_admin
    vault_db_demo_schema: demo
  tasks:
    - name: Leer las credenciales de Vault desde el archivo local
      ansible.builtin.slurp:
        src: "{{ vault_credentials_file }}"
      register: vault_credentials_slurp

    - name: Fijar el token root como variable
      ansible.builtin.set_fact:
        vault_root_token: "{{ (vault_credentials_slurp.content | b64decode | from_json).root_token }}"
      no_log: true

    - name: Leer la contraseña root de PXC desde el archivo local
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/pxc_root_password.txt"
      register: pxc_root_password_slurp

    - name: Fijar la contraseña root de PXC como variable
      ansible.builtin.set_fact:
        pxc_root_password: "{{ pxc_root_password_slurp.content | b64decode | trim }}"
      no_log: true

    # Se persiste en un archivo local (igual que el resto de credenciales del
    # proyecto): "CREATE USER IF NOT EXISTS" en MySQL ignora la cláusula
    # IDENTIFIED BY si el usuario ya existe, así que generar una contraseña
    # nueva en cada ejecución dejaría desincronizada la que Vault tiene
    # guardada en `database/config/pxc` con la real del usuario en MySQL,
    # rompiendo la idempotencia (bug real encontrado y corregido en este
    # mismo laboratorio).
    - name: Comprobar si ya existe el archivo local de la contraseña de vault_admin
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/vault_db_admin_password.txt"
      register: vault_db_admin_password_file_status

    - name: Generar una contraseña aleatoria para el usuario vault_admin de MySQL
      ansible.builtin.set_fact:
        vault_db_admin_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      no_log: true
      when: not vault_db_admin_password_file_status.stat.exists

    - name: Guardar la contraseña de vault_admin en un archivo local
      ansible.builtin.copy:
        content: "{{ vault_db_admin_password }}"
        dest: "{{ playbook_dir }}/vault_db_admin_password.txt"
        mode: "0600"
      when: not vault_db_admin_password_file_status.stat.exists

    - name: Leer la contraseña de vault_admin desde el archivo local
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/vault_db_admin_password.txt"
      register: vault_db_admin_password_slurp
      when: vault_db_admin_password_file_status.stat.exists

    - name: Fijar la contraseña de vault_admin leída del archivo como variable
      ansible.builtin.set_fact:
        vault_db_admin_password: "{{ vault_db_admin_password_slurp.content | b64decode | trim }}"
      no_log: true
      when: vault_db_admin_password_file_status.stat.exists

    - name: Crear el esquema de demostración y el usuario dedicado vault_admin en PXC (privilegios mínimos)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }}
        -e "
        CREATE DATABASE IF NOT EXISTS {{ vault_db_demo_schema }};
        CREATE TABLE IF NOT EXISTS {{ vault_db_demo_schema }}.prueba (id INT PRIMARY KEY, valor VARCHAR(50));
        REPLACE INTO {{ vault_db_demo_schema }}.prueba VALUES (1, 'secreto-dinamico-ok');
        CREATE USER IF NOT EXISTS '{{ vault_db_admin_user }}'@'%' IDENTIFIED BY '{{ vault_db_admin_password }}';
        GRANT CREATE USER, GRANT OPTION, DROP ON *.* TO '{{ vault_db_admin_user }}'@'%';
        GRANT SELECT ON {{ vault_db_demo_schema }}.* TO '{{ vault_db_admin_user }}'@'%';
        FLUSH PRIVILEGES;
        "
      changed_when: true
      no_log: true

    - name: Comprobar si el Database Secrets Engine ya está habilitado
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault secrets list -format=json
      register: vault_secrets_list
      changed_when: false
      no_log: true

    - name: Habilitar el Database Secrets Engine
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault secrets enable database
      when: "'database/' not in (vault_secrets_list.stdout | from_json)"
      changed_when: true

    - name: Configurar la conexión de Vault al clúster PXC (vía el Service interno de HAProxy)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault write database/config/pxc
        plugin_name=mysql-database-plugin
        connection_url="{{ '{{username}}' }}:{{ '{{password}}' }}@tcp({{ pxc_release_name }}-haproxy.pxc.svc:3306)/"
        allowed_roles="app-role"
        username="{{ vault_db_admin_user }}"
        password="{{ vault_db_admin_password }}"
      changed_when: true
      no_log: true

    - name: Crear el role app-role (credenciales de solo lectura sobre el esquema de demo, TTL corto)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n {{ vault_namespace }} exec vault-0 --
        env VAULT_TOKEN={{ vault_root_token }} vault write database/roles/app-role
        db_name=pxc
        creation_statements="CREATE USER '{{ '{{name}}' }}'@'%' IDENTIFIED BY '{{ '{{password}}' }}'; GRANT SELECT ON {{ vault_db_demo_schema }}.* TO '{{ '{{name}}' }}'@'%';"
        default_ttl="{{ vault_db_role_default_ttl }}"
        max_ttl="{{ vault_db_role_max_ttl }}"
      changed_when: true

    - name: Mostrar resumen de la configuración del motor de secretos de BBDD
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡DATABASE SECRETS ENGINE CONFIGURADO CON ÉXITO!"
          - "  "
          - "  Vault ya puede generar credenciales MySQL dinámicas para PXC,"
          - "  vía el role 'app-role' (solo SELECT sobre {{ vault_db_demo_schema }},"
          - "  TTL por defecto {{ vault_db_role_default_ttl }}, máximo {{ vault_db_role_max_ttl }})."
          - "════════════════════════════════════════════════════════════════"
