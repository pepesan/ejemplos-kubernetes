---
# This role creates real LXD instances, so it's tested with the "default"
# driver (formerly named "delegated") against the real host (which must
# already be bootstrapped by lxd_host_bootstrap) instead of an isolated
# container-based driver. This scenario provisions a single throwaway
# virtual-machine instance.
driver:
  name: default

platforms:
  - name: localhost

provisioner:
  name: ansible
  # Points ansible-playbook at ansible/roles/ (this role's parent
  # directory) so "roles: [lxd_machine_provision]" in converge.yml
  # resolves without needing the role to be installed as a collection.
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
        children:
          molecule_test_nodes:
            hosts:
              molecule-test-vm-1:
                ansible_host: 10.207.154.90
                lxd_cpu: 1
                lxd_mem: 1GB
                lxd_disk: 10GB

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - idempotence
    - verify
    - destroy
