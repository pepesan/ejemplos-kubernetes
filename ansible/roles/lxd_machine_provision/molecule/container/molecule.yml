---
# Same reasoning as molecule/default/molecule.yml, but this scenario
# provisions a throwaway LXD *container* instead of a virtual-machine, to
# exercise the lxd_instance_type: container code path.
driver:
  name: default

platforms:
  - name: localhost

provisioner:
  name: ansible
  # See molecule/default/molecule.yml for why this is needed.
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
        children:
          molecule_test_nodes:
            hosts:
              molecule-test-container-1:
                ansible_host: 10.207.154.91
                lxd_cpu: 1
                lxd_mem: 1GB
                lxd_disk: 10GB

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
