---
# Ubuntu's snapd package sets up the classic "/snap" symlink automatically;
# Debian's does not (documented Debian wiki gotcha) — without it, classic
# confinement snaps (kubectl, helm below) fail to resolve their paths.
# Harmless no-op on Ubuntu, where the symlink already exists. "force: true"
# is required: /var/lib/snapd/snap doesn't exist yet immediately after
# installing the snapd package (only snapd itself creates it, on first
# run), and ansible.builtin.file's "link" state refuses to create a
# symlink to a target that doesn't exist yet unless forced — confirmed
# live, this failed on every distro without it, not just Debian.
- name: Ensure the classic snap mount point exists (required on Debian, already present on Ubuntu)
  ansible.builtin.file:
    src: /var/lib/snapd/snap
    dest: /snap
    state: link
    force: true

- name: Install LXD, kubectl and helm via snap
  community.general.snap:
    name: "{{ item.name }}"
    state: present
    classic: "{{ item.classic | default(omit) }}"
  loop: "{{ lxd_snap_packages }}"
