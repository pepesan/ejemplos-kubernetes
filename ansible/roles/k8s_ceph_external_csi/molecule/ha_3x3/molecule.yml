---
# Topology matrix: the Ceph side is fixed (1 mon + 3 OSD), this scenario
# mirrors k8s_ha_cluster's own "ha_3x3" topology (3 managers + 3 workers,
# the full HA shape). See default, ha_1x2 and single_manager for the other
# 3 topologies. 8 VMs total — the most expensive scenario in this repo.
driver:
  name: default

platforms:
  - name: localhost

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
        children:
          ceph_monitors:
            hosts:
              molecule-kcec-ha3x3-ceph-mon:
                ansible_host: 10.207.154.200
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
          ceph_osds:
            hosts:
              molecule-kcec-ha3x3-ceph-osd1:
                ansible_host: 10.207.154.201
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
                lxd_extra_disk: 10GB
              molecule-kcec-ha3x3-ceph-osd2:
                ansible_host: 10.207.154.202
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
                lxd_extra_disk: 10GB
              molecule-kcec-ha3x3-ceph-osd3:
                ansible_host: 10.207.154.203
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
                lxd_extra_disk: 10GB
          ceph_nodes:
            children:
              ceph_monitors:
              ceph_osds:
          k8s_nodes:
            children:
              first_manager:
                hosts:
                  molecule-kcec-ha3x3-k8s-manager1:
                    ansible_host: 10.207.154.204
                    lxd_cpu: 2
                    lxd_mem: 3GB
                    lxd_disk: 20GB
              additional_managers:
                hosts:
                  molecule-kcec-ha3x3-k8s-manager2:
                    ansible_host: 10.207.154.205
                    lxd_cpu: 2
                    lxd_mem: 3GB
                    lxd_disk: 20GB
                  molecule-kcec-ha3x3-k8s-manager3:
                    ansible_host: 10.207.154.206
                    lxd_cpu: 2
                    lxd_mem: 3GB
                    lxd_disk: 20GB
              workers:
                hosts:
                  molecule-kcec-ha3x3-k8s-worker1:
                    ansible_host: 10.207.154.207
                    lxd_cpu: 2
                    lxd_mem: 2GB
                    lxd_disk: 15GB
                  molecule-kcec-ha3x3-k8s-worker2:
                    ansible_host: 10.207.154.208
                    lxd_cpu: 2
                    lxd_mem: 2GB
                    lxd_disk: 15GB
                  molecule-kcec-ha3x3-k8s-worker3:
                    ansible_host: 10.207.154.209
                    lxd_cpu: 2
                    lxd_mem: 2GB
                    lxd_disk: 15GB
          molecule_ssh_group:
            children:
              ceph_monitors:
              ceph_osds:
              first_manager:
              additional_managers:
              workers:
    group_vars:
      molecule_ssh_group:
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
