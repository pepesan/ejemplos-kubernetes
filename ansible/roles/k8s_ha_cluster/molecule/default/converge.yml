---
- name: Converge
  hosts: k8s_nodes
  vars:
    k8s_vip_address: "10.207.154.123"
    k8s_vip_interface: enp5s0
    # Overridable via env vars by molecule/run_matrix.sh, which loops this
    # scenario (and the other 3) across every CNI x CSI combination to map
    # out which ones are actually viable. Defaults match this scenario's
    # normal, non-matrix run.
    k8s_ha_cluster_cni: "{{ lookup('env', 'K8S_HA_CLUSTER_TEST_CNI') | default('flannel', true) }}"
    k8s_ha_cluster_csi: "{{ lookup('env', 'K8S_HA_CLUSTER_TEST_CSI') | default('longhorn', true) }}"
    k8s_ha_cluster_headlamp_enabled: true
    k8s_ha_cluster_kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  roles:
    - k8s_ha_cluster
