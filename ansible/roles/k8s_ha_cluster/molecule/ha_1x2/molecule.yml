---
# Single manager + 2 workers: no additional_managers, so
# control_plane_join.yml's guard (groups[...] | default([])) resolves to an
# empty list; workers_join.yml exercises 2 real joins.
driver:
  name: default

platforms:
  - name: localhost

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
        children:
          k8s_nodes:
            children:
              first_manager:
                hosts:
                  molecule-ha1x2-manager1:
                    ansible_host: 10.207.154.150
                    lxd_cpu: 2
                    lxd_mem: 3GB
                    lxd_disk: 20GB
              additional_managers: {}
              workers:
                hosts:
                  molecule-ha1x2-worker1:
                    ansible_host: 10.207.154.151
                    lxd_cpu: 2
                    lxd_mem: 2GB
                    lxd_disk: 15GB
                  molecule-ha1x2-worker2:
                    ansible_host: 10.207.154.152
                    lxd_cpu: 2
                    lxd_mem: 2GB
                    lxd_disk: 15GB
          molecule_ssh_group:
            children:
              first_manager:
              workers:
    group_vars:
      molecule_ssh_group:
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
