---
- name: Install Kubernetes tooling
  when: inventory_hostname in groups[k8s_ha_cluster_nodes_group]
  block:
    - name: Install Kubernetes tooling packages (Debian family)
      ansible.builtin.include_tasks: k8s_tools_debian.yml
      when: ansible_facts.os_family == 'Debian'

    - name: Install Kubernetes tooling packages (RedHat family)
      ansible.builtin.include_tasks: k8s_tools_redhat.yml
      when: ansible_facts.os_family == 'RedHat'

    - name: Start and enable the kubelet service
      ansible.builtin.systemd:
        name: kubelet
        state: started
        enabled: true
