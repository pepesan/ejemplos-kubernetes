---
# Ported from ansible/base/02_k8s_base_ha_3_managers_3_workers/04_instalar_containerd.yml.
- name: Install prerequisite packages (ca-certificates, curl, gnupg)
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: true
    lock_timeout: 300

- name: Create the APT keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download the Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add the official Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
    update_cache: true

- name: Install containerd.io
  ansible.builtin.apt:
    name: containerd.io
    state: present
    lock_timeout: 300
