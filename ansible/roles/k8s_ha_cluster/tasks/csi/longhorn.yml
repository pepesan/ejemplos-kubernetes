---
# Ported from ansible/base/03_k8s_ha_almacenamiento_persistente_longhorn/10_desplegar_longhorn.yml.
# The workload/storage node-pool split is optional here: both groups default
# to the general workers group (see defaults/main.yml), so a caller that
# hasn't defined dedicated pools just gets every worker doing both.
#
# The storage-node taint is only applied when the two pools are genuinely
# distinct. Found live: with a single, undivided workers group (the
# default), that one worker would get labeled as BOTH workload and storage
# and then tainted "storage-node=true:NoSchedule" — but Longhorn's own
# longhorn-ui/longhorn-driver-deployer Deployments don't tolerate that taint
# (only the longhorn-manager DaemonSet does, via the Helm values below), and
# the control-plane nodes are tainted separately, so with only one worker
# there'd be nowhere left for longhorn-ui to schedule. It would sit Pending
# forever, timing out the wait step below with no real fix from raising the
# timeout further.
- name: Determine whether workload and storage are genuinely separate pools
  ansible.builtin.set_fact:
    k8s_ha_cluster_longhorn_dedicated_pools: "{{ k8s_ha_cluster_longhorn_workload_group != k8s_ha_cluster_longhorn_storage_group }}"
  run_once: true

- name: Label workload nodes
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_ha_cluster_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ item }}"
        labels:
          node.longhorn.io/workload-node: "true"
  loop: "{{ groups[k8s_ha_cluster_longhorn_workload_group] }}"
  delegate_to: localhost
  run_once: true

- name: Label storage nodes for Longhorn
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_ha_cluster_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ item }}"
        labels:
          node.longhorn.io/storage-node: "true"
          node.longhorn.io/create-default-disk: "true"
  loop: "{{ groups[k8s_ha_cluster_longhorn_storage_group] }}"
  delegate_to: localhost
  run_once: true

- name: Apply storage taints to storage nodes (only when workload/storage are dedicated pools)
  ansible.builtin.command: >
    kubectl --kubeconfig={{ k8s_ha_cluster_kubeconfig_path }} taint node {{ item }} storage-node=true:NoSchedule
  loop: "{{ groups[k8s_ha_cluster_longhorn_storage_group] }}"
  when: k8s_ha_cluster_longhorn_dedicated_pools | bool
  register: taint_out
  failed_when:
    - taint_out.rc != 0
    - "'already has' not in taint_out.stderr"
  changed_when: "'tainted' in taint_out.stdout"
  delegate_to: localhost
  run_once: true

- name: Add the Longhorn Helm repository
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
  delegate_to: localhost
  run_once: true

- name: Create the longhorn-system namespace if missing
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_ha_cluster_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: longhorn-system
  delegate_to: localhost
  run_once: true

- name: Install or upgrade Longhorn via Helm
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "{{ k8s_ha_cluster_longhorn_chart_version }}"
    release_namespace: longhorn-system
    kubeconfig: "{{ k8s_ha_cluster_kubeconfig_path }}"
    values:
      defaultSettings:
        createDefaultDiskLabeledNodes: true
        defaultReplicaCount: 3
        taintToleration: "storage-node=true:NoSchedule"
      persistence:
        defaultClass: true
        defaultClassReplicaCount: 3
      longhornManager:
        tolerations:
          - key: storage-node
            operator: Equal
            value: "true"
            effect: NoSchedule
      service:
        ui:
          type: NodePort
          nodePort: 32085
  delegate_to: localhost
  run_once: true

- name: Wait for Longhorn Manager to be ready on compute and storage nodes
  ansible.builtin.command: >
    kubectl --kubeconfig={{ k8s_ha_cluster_kubeconfig_path }} rollout status daemonset/longhorn-manager -n longhorn-system --timeout=300s
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Wait for the Longhorn UI deployment to be ready
  ansible.builtin.command: >
    kubectl --kubeconfig={{ k8s_ha_cluster_kubeconfig_path }} rollout status deployment/longhorn-ui -n longhorn-system --timeout=300s
  changed_when: false
  delegate_to: localhost
  run_once: true

# Found live via the CNI×CSI×topology matrix sweep: the longhorn-manager
# DaemonSet and longhorn-ui Deployment being ready doesn't guarantee the
# "longhorn" StorageClass (created by the chart's "persistence.defaultClass"
# setting) already exists — under Cilium in particular, it can still lag
# behind by several seconds. Wait for it explicitly rather than assuming
# the two prior rollout waits cover it.
- name: Wait for the Longhorn StorageClass to be created
  ansible.builtin.command: >
    kubectl --kubeconfig={{ k8s_ha_cluster_kubeconfig_path }} get storageclass longhorn
  register: longhorn_sc
  until: longhorn_sc.rc == 0
  retries: 30
  delay: 5
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Show Longhorn dashboard access details
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════════"
      - "  LONGHORN DEPLOYED SUCCESSFULLY"
      - "  "
      - "  Longhorn dashboard: http://{{ k8s_vip_address }}:32085"
      - "  "
      - "  Default StorageClass: 'longhorn'"
      - "  Replica count: 3"
      - "════════════════════════════════════════════════════════════════"
  run_once: true
