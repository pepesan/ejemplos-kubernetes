---
# Ported from ansible/base/02_k8s_base_ha_3_managers_3_workers/03_configurar_os.yml,
# unchanged except for being guarded to run only on cluster nodes (the role
# is invoked against nodes_group:localhost in a single play).
- name: Prepare the operating system for Kubernetes
  when: inventory_hostname in groups[k8s_ha_cluster_nodes_group]
  block:
    - name: Stop and disable unattended-upgrades and APT automatic timers
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - unattended-upgrades
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: false
      failed_when: false

    - name: Comment out the swap entry in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'
      failed_when: false

    - name: Configure kernel modules required at boot
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"

    - name: Load kernel modules immediately
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
      failed_when: false

    - name: Configure sysctl parameters required by Kubernetes
      ansible.builtin.copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: "0644"
      register: sysctl_conf

    - name: Apply sysctl parameters
      ansible.builtin.command: sysctl --system
      when: sysctl_conf.changed
      changed_when: true
      failed_when: false

    - name: Create the /dev/kmsg symlink if missing (required by kubelet)
      ansible.builtin.file:
        src: /dev/console
        dest: /dev/kmsg
        state: link
        force: true
