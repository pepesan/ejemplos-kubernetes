---
# Ported from ansible/base/02_k8s_base_ha_3_managers_3_workers/06_inicializar_primer_manager.yml.
# CNI installation is NOT here — it moved to tasks/cni/<name>.yml, selected by
# k8s_ha_cluster_cni, so this file stays CNI-agnostic.
- name: Initialize the first control-plane node
  when: inventory_hostname == groups[k8s_ha_cluster_first_manager_group][0]
  block:
    - name: Check whether Kubernetes is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Check whether the kube-vip static manifest already exists
      ansible.builtin.stat:
        path: /etc/kubernetes/manifests/kube-vip.yaml
      register: kube_vip_manifest

    - name: Ensure /etc/kubernetes/manifests exists
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        mode: "0755"
      when: not kube_vip_manifest.stat.exists

    - name: Pull the kube-vip image via containerd
      ansible.builtin.command: >
        ctr image pull {{ kube_vip_image }}
      when: not kube_vip_manifest.stat.exists
      changed_when: true

    - name: Generate the kube-vip static manifest for this manager
      ansible.builtin.shell: >
        ctr run --rm --net-host {{ kube_vip_image }} vip
        /kube-vip manifest pod
        --interface {{ k8s_vip_interface }}
        --address {{ k8s_vip_address }}
        --port {{ k8s_vip_port }}
        --controlplane --services --arp --leaderElection
        > /etc/kubernetes/manifests/kube-vip.yaml
      when: not kube_vip_manifest.stat.exists
      changed_when: true

    - name: Ensure /etc/kubernetes exists
      ansible.builtin.file:
        path: /etc/kubernetes
        state: directory
        mode: "0755"
      when: not kubeadm_admin_conf.stat.exists

    - name: Create the kubeadm configuration file
      ansible.builtin.copy:
        content: |
          apiVersion: kubeadm.k8s.io/v1beta3
          kind: InitConfiguration
          localAPIEndpoint:
            advertiseAddress: "{{ ansible_host }}"
          nodeRegistration:
            name: "{{ inventory_hostname }}"
            criSocket: unix:///var/run/containerd/containerd.sock
            imagePullPolicy: IfNotPresent
          ---
          apiVersion: kubeadm.k8s.io/v1beta3
          kind: ClusterConfiguration
          controlPlaneEndpoint: "{{ k8s_vip_address }}:{{ k8s_vip_port }}"
          networking:
            podSubnet: "{{ k8s_pod_network_cidr }}"
          ---
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          failSwapOn: false
          cgroupDriver: systemd
          featureGates:
            KubeletInUserNamespace: true
        dest: /etc/kubernetes/kubeadm-config.yaml
        mode: "0644"
      when: not kubeadm_admin_conf.stat.exists

    - name: Initialize the control plane with kubeadm (HA endpoint + upload-certs)
      ansible.builtin.command: >
        kubeadm init
        --config /etc/kubernetes/kubeadm-config.yaml
        --upload-certs
        --ignore-preflight-errors=SystemVerification,Swap
      register: kubeadm_init_output
      when: not kubeadm_admin_conf.stat.exists
      changed_when: true

    - name: Create the .kube directory for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: "0755"

    - name: Copy admin.conf to .kube/config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: "0600"

    - name: Fetch admin.conf to the local machine (kubeconfig)
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ k8s_ha_cluster_kubeconfig_path }}"
        flat: true

    - name: Apply the kube-vip RBAC (needed for leader-election on additional managers)
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_ha_cluster_kubeconfig_path }}"
        state: present
        src: "{{ role_path }}/files/kube-vip-rbac.yaml"
      delegate_to: localhost

    # kubeadm issues a fresh, differently-timestamped token/certificate-key
    # on every call by design (they're short-lived credentials, not stable
    # config) — regenerating and overwriting these files on every converge
    # would make the "save to a local file" steps always report changed,
    # for no real drift. Only (re)generate them the first time, same
    # "already done" idempotency pattern used everywhere else in this role.
    - name: Check whether the join command was already saved locally
      ansible.builtin.stat:
        path: "{{ inventory_dir }}/join_command.txt"
      register: join_command_file
      delegate_to: localhost

    - name: Generate the join command for workers
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false
      when: not join_command_file.stat.exists

    - name: Save the join command to a local file
      ansible.builtin.copy:
        content: "{{ join_command_raw.stdout }}"
        dest: "{{ inventory_dir }}/join_command.txt"
        mode: "0600"
      delegate_to: localhost
      when: not join_command_file.stat.exists

    - name: Re-print the certificate-key re-executably (to join more managers)
      ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
      register: upload_certs_out
      changed_when: false
      when: not join_command_file.stat.exists

    - name: Extract the certificate-key from the output
      ansible.builtin.set_fact:
        certificate_key: "{{ upload_certs_out.stdout_lines[-1] }}"
      when: not join_command_file.stat.exists

    - name: Save the certificate-key to a local file
      ansible.builtin.copy:
        content: "{{ certificate_key }}"
        dest: "{{ inventory_dir }}/certificate_key.txt"
        mode: "0600"
      delegate_to: localhost
      when: not join_command_file.stat.exists

    - name: Show instructions for using kubectl from the host
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  HA CONTROL PLANE FIRST MANAGER INITIALIZED"
          - "  "
          - "  Control-plane VIP: {{ k8s_vip_address }}:{{ k8s_vip_port }}"
          - "  "
          - "  To use kubectl from your physical machine (host), run:"
          - "  export KUBECONFIG={{ k8s_ha_cluster_kubeconfig_path }}"
          - "  "
          - "  Test the connection with:"
          - "  kubectl get nodes"
          - "════════════════════════════════════════════════════════════════"
