---
# Ported from ansible/base/02_k8s_base_ha_3_managers_3_workers/07_unir_managers.yml.
- name: Join the additional control-plane nodes
  when: inventory_hostname in groups[k8s_ha_cluster_additional_managers_group] | default([])
  block:
    - name: Check whether this node already belongs to the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Check whether the kube-vip static manifest already exists
      ansible.builtin.stat:
        path: /etc/kubernetes/manifests/kube-vip.yaml
      register: kube_vip_manifest

    - name: Ensure /etc/kubernetes/manifests exists
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        mode: "0755"
      when: not kube_vip_manifest.stat.exists

    - name: Pull the kube-vip image via containerd
      ansible.builtin.command: >
        ctr image pull {{ kube_vip_image }}
      when: not kube_vip_manifest.stat.exists
      changed_when: true

    - name: Generate the kube-vip static manifest for this manager
      ansible.builtin.shell: >
        ctr run --rm --net-host {{ kube_vip_image }} vip
        /kube-vip manifest pod
        --interface {{ k8s_vip_interface }}
        --address {{ k8s_vip_address }}
        --port {{ k8s_vip_port }}
        --controlplane --services --arp --leaderElection
        > /etc/kubernetes/manifests/kube-vip.yaml
      when: not kube_vip_manifest.stat.exists
      changed_when: true

    - name: Read the join command from the local file
      ansible.builtin.slurp:
        src: "{{ inventory_dir }}/join_command.txt"
      register: join_cmd_b64
      delegate_to: localhost

    - name: Read the certificate-key from the local file
      ansible.builtin.slurp:
        src: "{{ inventory_dir }}/certificate_key.txt"
      register: cert_key_b64
      delegate_to: localhost

    - name: Join this manager to the control plane
      ansible.builtin.command: >
        {{ (join_cmd_b64.content | b64decode) | trim }}
        --control-plane
        --certificate-key {{ (cert_key_b64.content | b64decode) | trim }}
        --ignore-preflight-errors=SystemVerification,Swap
      when: not kubeadm_admin_conf.stat.exists
      changed_when: true

    - name: Create the .kube directory for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: "0755"

    - name: Copy admin.conf to .kube/config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: "0600"

    - name: Show the manager join result
      ansible.builtin.debug:
        msg: "Manager {{ inventory_hostname }} joined the HA control plane."
