# Two independent clusters, joined only by ceph-csi: a standalone Ceph
# cluster (1 monitor + 3 OSDs) and a single-manager Kubernetes cluster.
# Adjust IPs/sizes to your own LXD host's subnet.
# lxd_extra_disk on the OSD hosts is a second raw block device
# (lxd_machine_provision), required for Ceph OSD backing storage.

[ceph_monitors]
ceph-mon1 ansible_host=10.207.154.70 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB

[ceph_osds]
ceph-osd1 ansible_host=10.207.154.71 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_extra_disk=10GB
ceph-osd2 ansible_host=10.207.154.72 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_extra_disk=10GB
ceph-osd3 ansible_host=10.207.154.73 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_extra_disk=10GB

[ceph_nodes:children]
ceph_monitors
ceph_osds

[first_manager]
ceph-k8s-manager1 ansible_host=10.207.154.74 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[k8s_nodes:children]
first_manager

[lxd_instances:children]
ceph_nodes
k8s_nodes

[lxd_instances:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
