# Example inventory: 2 managers + 2 workers HA cluster, plus one scratch
# host (new_workers) used only by scale_add_node.yml/scale_remove_node.yml
# to demonstrate k8s_node_scale_cycle. Adjust IPs/sizes to your own LXD
# host's subnet (this matches lxd_host_bootstrap's default 10.207.154.0/24).
# 10.207.154.67 is reserved for the kube-vip VIP — never assign it to a host.

[first_manager]
pxc-manager1 ansible_host=10.207.154.60 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[additional_managers]
pxc-manager2 ansible_host=10.207.154.61 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[workers]
pxc-worker1 ansible_host=10.207.154.62 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
pxc-worker2 ansible_host=10.207.154.63 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[k8s_nodes:children]
first_manager
additional_managers
workers

# Scratch group for scale_add_node.yml/scale_remove_node.yml — not part of
# the initial cluster bring-up (playbook.yml never touches this group).
[new_workers]
pxc-worker3 ansible_host=10.207.154.64 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[lxd_instances:children]
first_manager
additional_managers
workers
new_workers

[lxd_instances:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
