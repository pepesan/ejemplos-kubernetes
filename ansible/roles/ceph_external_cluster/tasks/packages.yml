---
# Ported from ansible/base/05_k8s_ha_almacenamiento_persistente_externo_ceph/10_desplegar_ceph_externo.yml
# ("Instalar Cephadm y preparar requerimientos en todos los nodos Ceph" play).
- name: Prepare every Ceph node
  when: inventory_hostname in (groups[ceph_external_cluster_monitors_group] + groups[ceph_external_cluster_osds_group])
  block:
    - name: Create the 'ceph' group (GID 167, required by cephadm and Ceph's containers)
      ansible.builtin.group:
        name: ceph
        gid: 167
        system: true
        state: present

    - name: Create the 'ceph' user (UID 167, required by cephadm and Ceph's containers)
      ansible.builtin.user:
        name: ceph
        uid: 167
        group: ceph
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        state: present

    - name: Install cephadm and Ceph client packages
      ansible.builtin.apt:
        name:
          - cephadm
          - python3-ceph-common
          - ceph-common
        state: present
        update_cache: true
        lock_timeout: 300

    - name: Ensure the SSH daemon is running and enabled
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: true
