---
# This role provisions real Ceph daemons via cephadm, so it's tested with
# the "default" driver (formerly "delegated") against the real host — same
# reasoning as every other role in this repo that touches real
# virtualization/infrastructure. 1 monitor + 3 OSDs: 3 is a hard floor, not
# a choice (configure_osds.yml's own wait can never succeed with fewer).
driver:
  name: default

platforms:
  - name: localhost

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
        children:
          ceph_monitors:
            hosts:
              molecule-ceph-mon:
                ansible_host: 10.207.154.160
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
          ceph_osds:
            hosts:
              molecule-ceph-osd1:
                ansible_host: 10.207.154.161
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
                lxd_extra_disk: 10GB
              molecule-ceph-osd2:
                ansible_host: 10.207.154.162
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
                lxd_extra_disk: 10GB
              molecule-ceph-osd3:
                ansible_host: 10.207.154.163
                lxd_cpu: 1
                lxd_mem: 2GB
                lxd_disk: 15GB
                lxd_extra_disk: 10GB
          ceph_nodes:
            children:
              ceph_monitors:
              ceph_osds:
          molecule_ssh_group:
            children:
              ceph_monitors:
              ceph_osds:
    group_vars:
      molecule_ssh_group:
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
