# Throwaway containers used only by test_lxd_host_bootstrap_distros.sh to
# smoke-test the lxd_host_bootstrap role across every distro it claims to
# support (meta/main.yml). Connects via the community.general.lxd
# connection plugin (lxc exec under the hood, executes as root by
# default) instead of SSH: real usage of this role runs with
# "connection: local" directly on the host being bootstrapped, so SSH was
# never actually part of the role's real requirements — only relevant here
# because of how the test happened to be wired the first time around.

[distro_test_nodes]
test-bootstrap-ubuntu2404 ansible_host=test-bootstrap-ubuntu2404 lxd_image=test-ubuntu-2404
test-bootstrap-ubuntu2604 ansible_host=test-bootstrap-ubuntu2604 lxd_image=test-ubuntu-2604
test-bootstrap-debian12   ansible_host=test-bootstrap-debian12   lxd_image=test-debian-12
test-bootstrap-debian13   ansible_host=test-bootstrap-debian13   lxd_image=test-debian-13

[distro_test_nodes:vars]
ansible_connection=community.general.lxd
