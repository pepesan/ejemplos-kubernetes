---
- name: Configurar requerimientos de Ceph en el nuevo OSD
  hosts: new_ceph_osds
  become: true
  gather_facts: false
  tasks:
    - name: Validar que existe el grupo new_ceph_osds en el inventario y no está vacío
      ansible.builtin.fail:
        msg: >
          No hay nodos Ceph OSD definidos para integrar. Este playbook asume que ya se ha
          ejecutado 13_add_node.yml y que la VM del nuevo nodo ya existe.
      when: "'new_ceph_osds' not in groups or groups['new_ceph_osds'] | length == 0"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Crear el grupo 'ceph' con GID 167 (requerido por cephadm y los contenedores de Ceph)
      ansible.builtin.group:
        name: ceph
        gid: 167
        system: true
        state: present

    - name: Crear el usuario 'ceph' con UID 167 (requerido por cephadm y los contenedores de Ceph)
      ansible.builtin.user:
        name: ceph
        uid: 167
        group: ceph
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        state: present

    - name: Instalar cephadm y requisitos (python3, LVM2, motor de contenedores) en el nuevo nodo Ceph
      ansible.builtin.apt:
        name:
          - cephadm
          - python3-ceph-common
          - ceph-common
          - lvm2
        state: present
        update_cache: true
        lock_timeout: 300

    - name: Asegurar que el daemon de SSH está activo y configurado
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: true

- name: Leer clave SSH pública de Ceph desde el monitor
  hosts: ceph_monitors
  become: true
  gather_facts: false
  tasks:
    - name: Leer clave SSH pública generada por Ceph
      ansible.builtin.slurp:
        src: /etc/ceph/ceph.pub
      register: ceph_pub_key_b64

    - name: Guardar clave pública de Ceph en memoria
      ansible.builtin.set_fact:
        ceph_ssh_key: "{{ ceph_pub_key_b64.content | b64decode }}"

- name: Distribuir clave SSH de Ceph al nuevo nodo OSD
  hosts: new_ceph_osds
  become: true
  gather_facts: false
  tasks:
    - name: Añadir clave SSH de Ceph a authorized_keys
      ansible.builtin.authorized_key:
        user: root
        state: present
        key: "{{ hostvars[groups['ceph_monitors'][0]]['ceph_ssh_key'] }}"

- name: Registrar e integrar el nuevo OSD en el clúster Ceph Externo
  hosts: ceph_monitors
  become: true
  gather_facts: false
  tasks:
    - name: Añadir el nuevo nodo host al clúster Ceph (vía cephadm)
      ansible.builtin.command: >
        ceph orch host add {{ item }} {{ hostvars[item].ansible_host }}
      loop: "{{ groups['new_ceph_osds'] | default([]) }}"
      register: host_add_out
      failed_when:
        - host_add_out.rc != 0
        - "'already exists' not in host_add_out.stderr"
      changed_when: "'Added host' in host_add_out.stdout"

    - name: Instruir a Ceph a escanear y aprovisionar OSDs en el nuevo nodo
      ansible.builtin.command: >
        ceph orch device ls {{ item }} --refresh
      loop: "{{ groups['new_ceph_osds'] | default([]) }}"
      changed_when: true

    - name: Esperar a que se aprovisione el OSD en el/los nuevo(s) nodo(s)
      ansible.builtin.command: ceph osd tree -f json
      register: new_osd_tree
      until: >
        (new_osd_tree.stdout | from_json).nodes
        | selectattr('name', 'in', groups['new_ceph_osds'] | default([]))
        | list | length >= groups['new_ceph_osds'] | default([]) | length
      retries: 60
      delay: 15
      changed_when: false

- name: Finalización de la integración Ceph Externo en Escenario 05
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Mostrar resumen del proceso
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡NUEVO NODO INTEGRADO EN EL CLÚSTER CEPH EXTERNO!"
          - "  "
          - "  Nodos Ceph OSD agregados: {{ groups['new_ceph_osds'] | default([]) | join(', ') }}"
          - "════════════════════════════════════════════════════════════════"
