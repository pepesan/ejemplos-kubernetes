# Inventario para clúster de Kubernetes HA (3 Managers + 3 Workers) y clúster Ceph Externo en LXD (independientes)
# La IP 10.207.154.49 queda reservada para la VIP de kube-vip (ver group_vars/all.yml)
# y no debe asignarse nunca a ningún host de este fichero.

[control_plane]
k8s-manager1 ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager2 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager3 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[first_manager]
k8s-manager1

[additional_managers]
k8s-manager2
k8s-manager3

[workers]
k8s-worker1 ansible_host=10.207.154.53 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB
k8s-worker2 ansible_host=10.207.154.54 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB
k8s-worker3 ansible_host=10.207.154.55 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB

# Clúster Ceph Externo (Independiente)
[ceph_monitors]
ceph-mon ansible_host=10.207.154.60 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB

[ceph_osds]
ceph-osd1 ansible_host=10.207.154.61 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_ceph_disk=20GB
ceph-osd2 ansible_host=10.207.154.62 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_ceph_disk=20GB
ceph-osd3 ansible_host=10.207.154.63 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_ceph_disk=20GB

[k8s_nodes:children]
control_plane
workers

[ceph_nodes:children]
ceph_monitors
ceph_osds

[all_nodes:children]
k8s_nodes
ceph_nodes

# Grupos de Escalado
[new_workers]
# k8s-worker4 ansible_host=10.207.154.56 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB

[new_ceph_osds]
# ceph-osd4 ansible_host=10.207.154.64 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB lxd_ceph_disk=20GB
