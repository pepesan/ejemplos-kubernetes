# Inventario para clúster de Kubernetes HA en LXD (3 Managers + 2 Workload Workers + 3 Storage Workers)
# La IP 10.207.154.49 queda reservada para la VIP de kube-vip (ver group_vars/all.yml)
# y no debe asignarse nunca a ningún host de este fichero.

[control_plane]
k8s-manager1 ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager2 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager3 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[first_manager]
k8s-manager1

[additional_managers]
k8s-manager2
k8s-manager3

[workload_workers]
k8s-worker1 ansible_host=10.207.154.53 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB
k8s-worker2 ansible_host=10.207.154.54 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB

[storage_workers]
k8s-storage1 ansible_host=10.207.154.55 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB
k8s-storage2 ansible_host=10.207.154.56 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB
k8s-storage3 ansible_host=10.207.154.57 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB

[workers:children]
workload_workers
storage_workers

[k8s_nodes:children]
control_plane
workers

# Grupo de Escalado: añade aquí cualquier nodo nuevo (workload o storage).
# Por defecto, todo nodo listado aquí se integra en Longhorn como NODO DE
# ALMACENAMIENTO (storage-node, con taint dedicado y sin cargas de trabajo
# de usuario). Ver 12_integrar_nodo_longhorn.yml y el README para más detalle.
[new_workers]
# k8s-storage4 ansible_host=10.207.154.59 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB

# Excepción explícita (opt-out): si quieres que un nodo de [new_workers] sea
# de cómputo (workload) en vez de almacenamiento, añade aquí SOLO su nombre
# de host (sin más datos, sus variables ya están definidas en [new_workers]).
[new_workload_workers]
# k8s-worker3
