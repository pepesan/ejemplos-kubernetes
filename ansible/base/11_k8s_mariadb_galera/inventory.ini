# Inventario para clúster de Kubernetes HA en LXD (3 Managers + 3 Workers hiperconvergentes)
# La IP 10.207.154.49 queda reservada para la VIP de kube-vip (ver group_vars/all.yml)
# y no debe asignarse nunca a ningún host de este fichero.
#
# Diseño hiperconvergente (como el escenario 07, no el 03): los 3 workers
# alojan tanto Longhorn como los Pods de MariaDB, sin nodos de storage dedicados
# — encaja perfectamente con las 3 réplicas Galera (una por worker).

[control_plane]
k8s-manager1 ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager2 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager3 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[first_manager]
k8s-manager1

[additional_managers]
k8s-manager2
k8s-manager3

[workers]
k8s-worker1 ansible_host=10.207.154.53 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-worker2 ansible_host=10.207.154.54 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-worker3 ansible_host=10.207.154.55 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[k8s_nodes:children]
control_plane
workers

# Grupo de Escalado: añade aquí DOS workers nuevos por cada escalado del
# clúster MariaDB (Galera). Al igual que en el escenario 10 (Percona),
# mariadb-operator SÍ exige un tamaño IMPAR de réplicas en tiempo real
# (rechaza la operación con "An odd number of MariaDB instances is required
# to avoid split brain situations for Galera" si no) — no se puede pasar de
# 3 a 4 réplicas, solo de 3 a 5. Cada réplica necesita su propio nodo de
# Kubernetes dedicado, nunca comparte nodo con otra réplica. Ver
# 15_add_nodes.yml / 16_integrar_nodos_mariadb.yml / 17_eliminar_nodos.yml.
[new_workers]
k8s-worker4 ansible_host=10.207.154.56 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-worker5 ansible_host=10.207.154.57 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
