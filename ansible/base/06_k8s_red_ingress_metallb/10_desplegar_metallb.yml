---
- name: Desplegar MetalLB (LoadBalancer L2 local)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Agregar el repositorio de MetalLB a Helm
      kubernetes.core.helm_repository:
        name: metallb
        repo_url: https://metallb.github.io/metallb

    - name: Instalar MetalLB usando Helm en namespace metallb-system
      kubernetes.core.helm:
        name: metallb
        chart_ref: metallb/metallb
        chart_version: "{{ metallb_chart_version }}"
        release_namespace: metallb-system
        create_namespace: true
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Esperar a que el controller de MetalLB esté listo
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n metallb-system rollout status deployment/metallb-controller --timeout=180s
      changed_when: false

    - name: Esperar a que el webhook de validación de MetalLB esté disponible
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n metallb-system get validatingwebhookconfigurations metallb-webhook-configuration
      register: metallb_webhook_check
      until: metallb_webhook_check.rc == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: Crear el IPAddressPool para el rango de IPs LoadBalancer
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: default-pool
            namespace: metallb-system
          spec:
            addresses:
              - "{{ metallb_ip_range }}"
      register: metallb_pool_create
      retries: 10
      delay: 5
      until: metallb_pool_create is not failed

    - name: Crear el L2Advertisement para anunciar el pool por ARP
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: default-l2-adv
            namespace: metallb-system
          spec:
            ipAddressPools:
              - default-pool
      register: metallb_l2_create
      retries: 10
      delay: 5
      until: metallb_l2_create is not failed

    - name: Mostrar resumen de MetalLB
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡METALLB DESPLEGADO CON ÉXITO!"
          - "  "
          - "  Rango de IPs LoadBalancer: {{ metallb_ip_range }}"
          - "  (anunciado por ARP/L2 en la red {{ lxd_network }})"
          - "════════════════════════════════════════════════════════════════"
