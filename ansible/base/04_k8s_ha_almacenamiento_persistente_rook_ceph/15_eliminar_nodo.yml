---
- name: Eliminar un nodo worker del clúster Rook Ceph
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Validar que se ha especificado el nombre del nodo a eliminar
      ansible.builtin.fail:
        msg: "Por favor, especifica el nombre del nodo a eliminar usando: -e 'node_name=nombre-del-nodo'"
      when: node_name is not defined

    - name: Comprobar si el nodo existe en el clúster
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} get node {{ node_name }}
      register: node_check
      failed_when: false
      changed_when: false

    - name: Drenar el nodo de Kubernetes de forma segura (evacuar pods de carga de trabajo y OSD)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} drain {{ node_name }}
        --delete-emptydir-data --ignore-daemonsets --force
      when: node_check.rc == 0
      failed_when: false

    - name: Obtener los IDs de los OSD de Ceph alojados en el nodo a eliminar
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n rook-ceph exec deploy/rook-ceph-tools --
        ceph osd ls-tree {{ node_name }}
      register: node_osd_ids
      failed_when: false
      changed_when: false

    - name: Marcar como 'out' los OSD del nodo a eliminar (deja de recibir datos nuevos)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n rook-ceph exec deploy/rook-ceph-tools --
        ceph osd out {{ item }}
      loop: "{{ node_osd_ids.stdout_lines | default([]) }}"
      when: node_osd_ids.rc == 0
      failed_when: false
      changed_when: true

    - name: Purgar del CRUSH map, auth y osdmap los OSD del nodo a eliminar
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n rook-ceph exec deploy/rook-ceph-tools --
        ceph osd purge {{ item }} --force --yes-i-really-mean-it
      loop: "{{ node_osd_ids.stdout_lines | default([]) }}"
      when: node_osd_ids.rc == 0
      failed_when: false
      changed_when: true

    - name: Eliminar el Deployment residual del OSD si el operador de Rook no lo limpia solo
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: apps/v1
        kind: Deployment
        name: "rook-ceph-osd-{{ item }}"
        namespace: rook-ceph
        state: absent
      loop: "{{ node_osd_ids.stdout_lines | default([]) }}"
      when: node_osd_ids.rc == 0
      failed_when: false

    - name: Quitar la flag 'noout' que Rook deja en el host al drenarlo
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n rook-ceph exec deploy/rook-ceph-tools --
        ceph osd unset-group noout {{ node_name }}
      failed_when: false
      changed_when: true

    - name: Eliminar el bucket CRUSH vacío del host (ya sin OSDs)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n rook-ceph exec deploy/rook-ceph-tools --
        ceph osd crush rm {{ node_name }}
      failed_when: false
      changed_when: true

    - name: Restablecer configuración de kubeadm en el nodo a eliminar si está accesible
      ansible.builtin.command: >
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_ed25519 root@{{ node_name }} "kubeadm reset -f"
      register: kubeadm_reset_out
      failed_when: false
      changed_when: false
      when: node_check.rc == 0

    - name: Eliminar el nodo de la lista del clúster de Kubernetes
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} delete node {{ node_name }}
      when: node_check.rc == 0
      failed_when: false

    - name: Comprobar si la VM de LXD existe
      ansible.builtin.command: >
        lxc info {{ node_name }}
      register: lxc_check
      failed_when: false
      changed_when: false

    - name: Detener y eliminar la máquina virtual LXD del nodo
      community.general.lxd_container:
        name: "{{ node_name }}"
        state: absent
        force_stop: true
        timeout: 30
      when: lxc_check.rc == 0

    - name: Eliminar el volumen de almacenamiento OSD de Ceph en LXD
      ansible.builtin.command: >
        lxc storage volume delete default {{ node_name }}-ceph-disk
      failed_when: false
      changed_when: true

    - name: Resultado de la eliminación
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡NODO WORKER Y OSD ELIMINADOS CON ÉXITO!"
          - "  "
          - "  El nodo '{{ node_name }}' ha sido drenado, eliminado de Kubernetes"
          - "  y su VM LXD junto al disco OSD de Ceph han sido eliminados."
          - "  Ceph redistribuirá y balanceará el almacenamiento restante."
          - "════════════════════════════════════════════════════════════════"
