# Inventario para clúster de Kubernetes HA en LXD (3 Managers + 3 Workers hiperconvergentes)
# La IP 10.207.154.49 queda reservada para la VIP de kube-vip (ver group_vars/all.yml)
# y no debe asignarse nunca a ningún host de este fichero.
#
# Diseño hiperconvergente (como los escenarios 07, 10 y 11): los 3 workers
# alojan tanto Longhorn como los Pods de PostgreSQL, sin nodos de storage
# dedicados — encaja perfectamente con las 3 réplicas (una por worker).

[control_plane]
k8s-manager1 ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager2 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-manager3 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[first_manager]
k8s-manager1

[additional_managers]
k8s-manager2
k8s-manager3

[workers]
k8s-worker1 ansible_host=10.207.154.53 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-worker2 ansible_host=10.207.154.54 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
k8s-worker3 ansible_host=10.207.154.55 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[k8s_nodes:children]
control_plane
workers

# Grupo de Escalado: añade aquí un worker nuevo por cada réplica que se quiera
# sumar al clúster PostgreSQL. A diferencia de los escenarios 10 y 11 (motores
# Galera multi-máster, que exigen tamaño IMPAR por quórum), este operador usa
# Patroni (un solo primario + réplicas de solo lectura vía streaming
# replication), sin esa restricción de paridad — se escala de una en una.
# Cada réplica necesita su propio nodo de Kubernetes dedicado, nunca comparte
# nodo con otra réplica. Ver 15_add_nodes.yml / 16_integrar_nodos_pg.yml /
# 17_eliminar_nodos.yml.
[new_workers]
k8s-worker4 ansible_host=10.207.154.56 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB
