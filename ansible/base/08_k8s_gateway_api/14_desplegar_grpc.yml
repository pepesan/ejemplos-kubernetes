---
- name: Desplegar servicio gRPC de demostración y exponerlo vía Gateway API (GRPCRoute)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Desplegar el servicio gRPC de demostración "grpcbin" (Deployment + Service)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: demo-grpc
              namespace: default
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: demo-grpc
              template:
                metadata:
                  labels:
                    app: demo-grpc
                spec:
                  containers:
                    - name: grpcbin
                      image: kong/grpcbin
                      ports:
                        - containerPort: 9000
          - apiVersion: v1
            kind: Service
            metadata:
              name: demo-grpc
              namespace: default
            spec:
              selector:
                app: demo-grpc
              ports:
                # appProtocol h2c le indica a Cilium que hable HTTP/2 en texto
                # plano (sin TLS) con este backend, imprescindible para enrutar gRPC.
                - port: 9000
                  targetPort: 9000
                  appProtocol: kubernetes.io/h2c

    - name: Esperar a que el Deployment gRPC esté disponible
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n default rollout status deployment/demo-grpc --timeout=180s
      changed_when: false

    - name: Crear el GRPCRoute que expone el servicio gRPC a través del Gateway
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: GRPCRoute
          metadata:
            name: demo-grpc
            namespace: default
          spec:
            parentRefs:
              - name: demo-gateway-grpc
                sectionName: grpc
            hostnames:
              - "grpc.{{ gateway_base_domain }}"
            rules:
              - backendRefs:
                  - name: demo-grpc
                    port: 9000

    - name: Mostrar datos de conexión al servicio gRPC
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡SERVICIO gRPC DESPLEGADO Y EXPUESTO VÍA GATEWAY API (GRPCRoute)!"
          - "  "
          - "  Prueba manual con grpcurl (necesita 'grpcurl' instalado localmente):"
          - "  grpcurl -plaintext -authority grpc.{{ gateway_base_domain }} -d '{\"greeting\":\"mundo\"}' <IP-DEL-GATEWAY>:8080 hello.HelloService/SayHello"
          - "════════════════════════════════════════════════════════════════"
