---
# Simula una actualización real del motor de MySQL/Galera (Percona XtraDB
# Cluster), de la versión fijada al desplegar (percona_pxc_image_tag) a una
# más reciente (percona_pxc_image_tag_upgrade). El propio operador hace el
# trabajo: con `updateStrategy: SmartUpdate` (valor por defecto del chart),
# actualiza los Pods de PXC uno a uno, esperando a que cada uno vuelva a
# estar "Synced" en Galera antes de continuar con el siguiente — igual que
# se haría a mano en un clúster Galera real, pero automatizado.
- name: Actualizar el motor de Percona XtraDB Cluster (Galera) sin downtime
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
    pxc_release_name: pxc-db
    pxc_new_image: "percona/percona-xtradb-cluster:{{ percona_pxc_image_tag_upgrade }}"
  tasks:
    - name: Leer la contraseña root de PXC desde el archivo local
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/pxc_root_password.txt"
      register: pxc_root_password_slurp

    - name: Fijar la contraseña root como variable
      ansible.builtin.set_fact:
        pxc_root_password: "{{ pxc_root_password_slurp.content | b64decode | trim }}"

    - name: Obtener el tamaño y la imagen actuales del clúster PXC
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc get pxc {{ pxc_release_name }} -o jsonpath={.spec.pxc.size}
      register: pxc_current_size
      changed_when: false

    - name: Obtener la imagen actual del clúster PXC
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc get pxc {{ pxc_release_name }} -o jsonpath={.spec.pxc.image}
      register: pxc_current_image
      changed_when: false

    - name: Fallar si ya está en la versión objetivo
      ansible.builtin.fail:
        msg: "El clúster ya está en la imagen {{ pxc_new_image }}. No hay nada que actualizar."
      when: pxc_current_image.stdout == pxc_new_image

    - name: "PRUEBA PREVIA: comprobar que el clúster Galera está sano ANTES de actualizar (wsrep_cluster_size)"
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }} -N -B
        -e "SHOW STATUS LIKE 'wsrep_cluster_size';"
      register: wsrep_size_before
      changed_when: false
      no_log: true
      failed_when: wsrep_size_before.stdout.split()[1] | default('0') | int != pxc_current_size.stdout | int

    - name: "PRUEBA PREVIA: comprobar que todos los nodos Galera están 'Synced' ANTES de actualizar"
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }} -N -B
        -e "SHOW STATUS LIKE 'wsrep_local_state_comment';"
      register: wsrep_state_before
      changed_when: false
      no_log: true
      failed_when: "'Synced' not in wsrep_state_before.stdout"

    - name: Comprobar la versión de MySQL ANTES de actualizar
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }} -N -B -e "SELECT VERSION();"
      register: mysql_version_before
      changed_when: false
      no_log: true

    - name: Mostrar estado previo confirmado
      ansible.builtin.debug:
        msg: >
          Estado previo OK: {{ pxc_current_size.stdout }} réplicas, todas 'Synced' en Galera.
          Imagen actual: {{ pxc_current_image.stdout }} (MySQL {{ mysql_version_before.stdout }}).

    - name: Aplicar la nueva imagen del motor PXC (el operador hace SmartUpdate, nodo a nodo)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: patched
        kind: PerconaXtraDBCluster
        api_version: pxc.percona.com/v1
        name: "{{ pxc_release_name }}"
        namespace: pxc
        definition:
          spec:
            pxc:
              image: "{{ pxc_new_image }}"

    - name: Esperar a que TODOS los Pods de PXC ejecuten ya la nueva imagen
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc get pod {{ pxc_release_name }}-pxc-{{ item }}
        -o 'jsonpath={.status.containerStatuses[?(@.name=="pxc")].image}'
      register: pod_image_check
      # Kubernetes normaliza la imagen añadiendo el registro por defecto
      # (docker.io/) en containerStatuses, aunque en el spec del CR y aquí
      # se referencie sin él — comparamos por subcadena, no por igualdad.
      until: pxc_new_image in pod_image_check.stdout
      retries: 60
      delay: 20
      changed_when: false
      loop: "{{ range(0, pxc_current_size.stdout | int) | list }}"
      loop_control:
        label: "pxc-{{ item }}"

    - name: "PRUEBA POSTERIOR: comprobar que el clúster Galera sigue sano tras la actualización (wsrep_cluster_size)"
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }} -N -B
        -e "SHOW STATUS LIKE 'wsrep_cluster_size';"
      register: wsrep_size_after
      changed_when: false
      no_log: true
      until: wsrep_size_after.stdout.split()[1] | default('0') | int == pxc_current_size.stdout | int
      retries: 20
      delay: 10

    - name: "PRUEBA POSTERIOR: comprobar que todas las réplicas quedan 'Synced' tras la actualización"
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }} -N -B
        -e "SHOW STATUS LIKE 'wsrep_local_state_comment';"
      register: wsrep_state_after
      changed_when: false
      no_log: true
      until: "'Synced' in wsrep_state_after.stdout"
      retries: 20
      delay: 10

    - name: Comprobar la versión de MySQL DESPUÉS de actualizar
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n pxc exec {{ pxc_release_name }}-pxc-0 -c pxc --
        mysql -uroot -p{{ pxc_root_password }} -N -B -e "SELECT VERSION();"
      register: mysql_version_after
      changed_when: false
      no_log: true

    - name: Mostrar resumen de la actualización
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡MOTOR DE PXC ACTUALIZADO SIN DOWNTIME!"
          - "  "
          - "  Imagen anterior: {{ pxc_current_image.stdout }} (MySQL {{ mysql_version_before.stdout }})"
          - "  Imagen actual:   {{ pxc_new_image }} (MySQL {{ mysql_version_after.stdout }})"
          - "  "
          - "  Las {{ pxc_current_size.stdout }} réplicas se actualizaron una a una (SmartUpdate),"
          - "  confirmando 'Synced' en Galera entre cada Pod, sin perder el quórum en ningún momento."
          - "════════════════════════════════════════════════════════════════"
