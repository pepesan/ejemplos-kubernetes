---
- name: Desplegar Loki y Promtail (agregación centralizada de logs)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Agregar el repositorio de Grafana a Helm
      kubernetes.core.helm_repository:
        name: grafana
        repo_url: https://grafana.github.io/helm-charts

    - name: Instalar o actualizar Loki (modo single binary) usando Helm
      kubernetes.core.helm:
        name: loki
        chart_ref: grafana/loki
        chart_version: "{{ loki_chart_version }}"
        release_namespace: monitoring
        kubeconfig: "{{ kubeconfig_path }}"
        timeout: 10m0s
        values:
          deploymentMode: SingleBinary
          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            storage:
              type: filesystem
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              storageClass: longhorn
              size: "{{ observability_storage_size }}"
          # Deshabilitar componentes de despliegue distribuido (no hacen falta en modo single binary)
          read:
            replicas: 0
          write:
            replicas: 0
          backend:
            replicas: 0
          gateway:
            enabled: false
          test:
            enabled: false
          lokiCanary:
            enabled: false
          monitoring:
            selfMonitoring:
              enabled: false
            lokiCanary:
              enabled: false
            serviceMonitor:
              enabled: false
          # Deshabilitar las cachés opcionales de memcached: en un laboratorio de un
          # solo Pod de Loki no aportan nada y consumen memoria que los workers no
          # sobran (0/6 nodes are available: Insufficient memory).
          chunksCache:
            enabled: false
          resultsCache:
            enabled: false

    - name: Esperar a que Loki esté listo
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n monitoring rollout status statefulset/loki --timeout=300s
      changed_when: false

    - name: Instalar o actualizar Promtail usando Helm
      kubernetes.core.helm:
        name: promtail
        chart_ref: grafana/promtail
        chart_version: "{{ promtail_chart_version }}"
        release_namespace: monitoring
        kubeconfig: "{{ kubeconfig_path }}"
        values:
          config:
            clients:
              - url: http://loki:3100/loki/api/v1/push

    - name: Esperar a que Promtail esté listo en todos los nodos
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} -n monitoring rollout status daemonset/promtail --timeout=180s
      changed_when: false

    - name: Crear el datasource de Loki en Grafana
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: grafana-loki-datasource
            namespace: monitoring
            labels:
              grafana_datasource: "1"
          data:
            loki-datasource.yaml: |
              apiVersion: 1
              datasources:
                - name: Loki
                  type: loki
                  access: proxy
                  url: http://loki:3100
                  isDefault: false

    - name: Mostrar resumen de Loki/Promtail
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡LOKI Y PROMTAIL DESPLEGADOS CON ÉXITO!"
          - "  "
          - "  Loki recibe logs de todos los nodos vía Promtail (DaemonSet)."
          - "  Datasource de Loki añadido automáticamente a Grafana."
          - "════════════════════════════════════════════════════════════════"
