---
- name: Crear los nodos LXD para Kubernetes y Ceph Externo
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Cargar variables de configuración
      ansible.builtin.include_vars:
        file: group_vars/all.yml

    - name: Consultar los volúmenes de almacenamiento custom existentes en el pool default
      community.general.lxd_storage_volume_info:
        pool: default
        type: custom
      register: lxd_ceph_volumes_info

    - name: Crear volumen de almacenamiento Ceph OSD en LXD para nodos Ceph que no lo tengan aún
      ansible.builtin.command: >
        lxc storage volume create default {{ item }}-ceph-osd --type=block size={{ hostvars[item].lxd_ceph_disk }}
      loop: "{{ groups['ceph_osds'] }}"
      when: (item ~ '-ceph-osd') not in (lxd_ceph_volumes_info.storage_volumes | map(attribute='name') | list)
      changed_when: true

    - name: Crear/actualizar máquinas virtuales LXD para todos los nodos
      community.general.lxd_container:
        name: "{{ item }}"
        type: virtual-machine
        state: started
        source:
          type: image
          alias: "{{ lxd_image }}"
        config:
          limits.cpu: "{{ hostvars[item].lxd_cpu | string }}"
          limits.memory: "{{ hostvars[item].lxd_mem }}"
        devices: "{{ base_devices | combine(ceph_device) }}"
        wait_for_ipv4_addresses: false
        timeout: 90
      loop: "{{ groups['all_nodes'] }}"
      vars:
        base_devices:
          eth0:
            type: nic
            network: "{{ lxd_network }}"
            name: eth0
            "ipv4.address": "{{ hostvars[item].ansible_host }}"
          root:
            type: disk
            path: /
            pool: default
            size: "{{ hostvars[item].lxd_disk }}"
        ceph_device: "{{ {(item ~ '-ceph-osd'): {'type': 'disk', 'pool': 'default', 'source': item ~ '-ceph-osd'}} if hostvars[item].lxd_ceph_disk is defined else {} }}"

    - name: Esperar a que el agente de LXD esté listo en las máquinas virtuales
      ansible.builtin.command: >
        lxc exec {{ item }} -- true
      register: lxd_agent_status
      until: lxd_agent_status.rc == 0
      retries: 30
      delay: 2
      loop: "{{ groups['all_nodes'] }}"
      changed_when: false

    - name: Configurar accesibilidad SSH en todos los nodos
      ansible.builtin.command: >
        lxc exec {{ item.0 }} -- {{ item.1 }}
      loop: "{{ groups['all_nodes'] | product(ssh_setup_cmds) | list }}"
      vars:
        ssh_setup_cmds:
          - "mkdir -p /root/.ssh"
          - "chmod 700 /root/.ssh"
          - "chown root:root /root/.ssh"
      changed_when: false
      loop_control:
        label: "{{ item.0 }} - {{ item.1 }}"

    - name: Inyectar clave pública SSH ed25519 en todos los nodos
      ansible.builtin.command: >
        lxc file push ~/.ssh/id_ed25519.pub {{ item }}/root/.ssh/authorized_keys
      loop: "{{ groups['all_nodes'] }}"
      changed_when: false

    - name: Configurar propietario y permisos de authorized_keys
      ansible.builtin.command: >
        lxc exec {{ item.0 }} -- {{ item.1 }}
      loop: "{{ groups['all_nodes'] | product(auth_setup_cmds) | list }}"
      vars:
        auth_setup_cmds:
          - "chown root:root /root/.ssh/authorized_keys"
          - "chmod 600 /root/.ssh/authorized_keys"
      changed_when: false
      loop_control:
        label: "{{ item.0 }} - {{ item.1 }}"

    - name: Esperar a que SSH esté disponible en los nodos
      ansible.builtin.wait_for:
        host: "{{ hostvars[item].ansible_host }}"
        port: 22
        delay: 2
        timeout: 60
      loop: "{{ groups['all_nodes'] }}"

    - name: Nodos creados y accesibles por SSH
      ansible.builtin.debug:
        msg: "Nodo {{ item }} creado con IP {{ hostvars[item].ansible_host }}"
      loop: "{{ groups['all_nodes'] }}"
