---
- name: Preparar Kubeconfig local
  hosts: k8s_nodes
  gather_facts: false
  tasks:
    - name: Descargar admin.conf a la máquina local
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ playbook_dir }}/kubeconfig.yaml"
        flat: true

- name: Desplegar Nginx y verificar funcionamiento
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Crear namespace de prueba
      ansible.builtin.shell: kubectl create namespace test-nginx --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ns_create
      changed_when: "'created' in ns_create.stdout or 'configured' in ns_create.stdout"

    - name: Desplegar Nginx (Deployment + Service NodePort)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: nginx-deployment
          namespace: test-nginx
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: nginx
          template:
            metadata:
              labels:
                app: nginx
            spec:
              containers:
              - name: nginx
                image: nginx:alpine
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: nginx-service
          namespace: test-nginx
        spec:
          type: NodePort
          ports:
          - port: 80
            targetPort: 80
            nodePort: 32080
          selector:
            app: nginx
        EOF
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: apply_out
      changed_when: "'created' in apply_out.stdout or 'configured' in apply_out.stdout"

    - name: Esperar a que el deployment de Nginx esté listo
      ansible.builtin.command: >
        kubectl rollout status deployment/nginx-deployment -n test-nginx --timeout=90s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false

    - name: Realizar petición HTTP de prueba al NodePort (32080)
      ansible.builtin.uri:
        url: "http://10.207.154.50:32080"
        method: GET
        status_code: 200
      register: http_check
      retries: 10
      delay: 5
      until: http_check.status == 200

    - name: Mostrar resultado de verificación de Nginx
      ansible.builtin.debug:
        msg: "Verificación OK! Nginx respondiendo con código 200 en http://10.207.154.50:32080"
