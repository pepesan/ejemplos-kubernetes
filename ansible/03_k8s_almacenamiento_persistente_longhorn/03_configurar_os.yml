---
- name: Configurar OS e Instalar Requisitos de Longhorn (iscsid/nfs)
  hosts: k8s_nodes
  gather_facts: true
  tasks:
    - name: Detener y deshabilitar unattended-upgrades y timers de APT automáticos
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - unattended-upgrades
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false

    - name: Desactivar swap temporalmente
      ansible.builtin.command: swapoff -a
      changed_when: false
      failed_when: false

    - name: Comentar la entrada de swap en /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'
      failed_when: false

    - name: Configurar módulos de kernel necesarios en el arranque
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"

    - name: Cargar módulos de kernel inmediatamente
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
      failed_when: false

    - name: Configurar parámetros sysctl para Kubernetes
      ansible.builtin.copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: "0644"
      register: sysctl_conf

    - name: Aplicar parámetros sysctl
      ansible.builtin.command: sysctl --system
      when: sysctl_conf.changed
      changed_when: true
      failed_when: false

    - name: Crear enlace simbólico para /dev/kmsg si falta (requerido por kubelet)
      ansible.builtin.file:
        src: /dev/console
        dest: /dev/kmsg
        state: link
        force: true

    - name: Instalar dependencias de almacenamiento de Longhorn (open-iscsi, nfs-common)
      ansible.builtin.apt:
        name:
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true
        lock_timeout: 300

    - name: Asegurar que el servicio iscsid está iniciado y habilitado en el arranque
      ansible.builtin.systemd:
        name: iscsid
        state: started
        enabled: true
