---
- name: Instalar herramientas de Kubernetes en todos los nodos
  hosts: k8s_nodes
  gather_facts: true
  tasks:
    - name: Descargar la clave GPG del repositorio de Kubernetes
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_major_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"

    - name: Añadir el repositorio oficial de Kubernetes
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ k8s_major_version }}/deb/ /"
        filename: kubernetes
        state: present
        update_cache: true

    - name: Instalar kubelet, kubeadm y kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        lock_timeout: 300

    - name: Evitar que se actualicen automáticamente kubelet, kubeadm y kubectl
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Arrancar y habilitar el servicio kubelet
      ansible.builtin.systemd:
        name: kubelet
        state: started
        enabled: true
