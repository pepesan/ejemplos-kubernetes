# Inventario para clúster de Kubernetes en LXD (1 Manager + 2 Workload Workers + 3 Storage Workers)

[control_plane]
k8s-manager ansible_host=10.207.154.50 lxd_cpu=2 lxd_mem=3GB lxd_disk=20GB

[workload_workers]
k8s-worker1 ansible_host=10.207.154.51 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB
k8s-worker2 ansible_host=10.207.154.52 lxd_cpu=2 lxd_mem=2GB lxd_disk=15GB

[storage_workers]
k8s-storage1 ansible_host=10.207.154.56 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB
k8s-storage2 ansible_host=10.207.154.57 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB
k8s-storage3 ansible_host=10.207.154.58 lxd_cpu=1 lxd_mem=2GB lxd_disk=15GB

[workers:children]
workload_workers
storage_workers

[k8s_nodes:children]
control_plane
workers
