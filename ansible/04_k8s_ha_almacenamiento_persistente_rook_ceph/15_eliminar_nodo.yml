---
- name: Eliminar un nodo worker del clúster Rook Ceph
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
  tasks:
    - name: Validar que se ha especificado el nombre del nodo a eliminar
      ansible.builtin.fail:
        msg: "Por favor, especifica el nombre del nodo a eliminar usando: -e 'node_name=nombre-del-nodo'"
      when: node_name is not defined

    - name: Comprobar si el nodo existe en el clúster
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} get node {{ node_name }}
      register: node_check
      failed_when: false
      changed_when: false

    - name: Drenar el nodo de Kubernetes de forma segura (evacuar pods de carga de trabajo y OSD)
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} drain {{ node_name }}
        --delete-emptydir-data --ignore-daemonsets --force
      when: node_check.rc == 0
      failed_when: false

    - name: Restablecer configuración de kubeadm en el nodo a eliminar si está accesible
      ansible.builtin.command: >
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_ed25519 root@{{ node_name }} "kubeadm reset -f"
      register: kubeadm_reset_out
      failed_when: false
      changed_when: false
      when: node_check.rc == 0

    - name: Eliminar el nodo de la lista del clúster de Kubernetes
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }} delete node {{ node_name }}
      when: node_check.rc == 0
      failed_when: false

    - name: Comprobar si la VM de LXD existe
      ansible.builtin.command: >
        lxc info {{ node_name }}
      register: lxc_check
      failed_when: false
      changed_when: false

    - name: Detener y eliminar la máquina virtual LXD del nodo
      community.general.lxd_container:
        name: "{{ node_name }}"
        state: absent
      when: lxc_check.rc == 0

    - name: Eliminar el volumen de almacenamiento OSD de Ceph en LXD
      ansible.builtin.command: >
        lxc storage volume delete default {{ node_name }}-ceph-disk
      failed_when: false
      changed_when: true

    - name: Resultado de la eliminación
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  ¡NODO WORKER Y OSD ELIMINADOS CON ÉXITO!"
          - "  "
          - "  El nodo '{{ node_name }}' ha sido drenado, eliminado de Kubernetes"
          - "  y su VM LXD junto al disco OSD de Ceph han sido eliminados."
          - "  Ceph redistribuirá y balanceará el almacenamiento restante."
          - "════════════════════════════════════════════════════════════════"
